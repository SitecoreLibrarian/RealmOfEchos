  overlay.style.cssText = 'position:fixed;inset:0;background:#000000bb;z-index:300;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:var(--panel);border:2px solid var(--accent);border-radius:12px;padding:20px 22px;min-width:260px;max-width:90vw;font-family:"VT323",monospace;';

  const title = document.createElement('div');
  title.style.cssText = 'font-size:22px;color:var(--accent);margin-bottom:4px';
  title.textContent = item.emoji + ' ' + item.name;
  box.appendChild(title);

  const eff = document.createElement('div');
  eff.style.cssText = 'font-size:15px;color:var(--dim);margin-bottom:14px';
  eff.textContent = item.effect;
  box.appendChild(eff);

  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-size:14px;color:var(--dim);letter-spacing:2px;margin-bottom:8px';
  lbl.textContent = 'USE ON:';
  box.appendChild(lbl);

  const allMons = [...STATE.party, ...STATE.bench];
  allMons.forEach(m => {
    const el = ELEMENTS[m.element];
    const inParty = !!STATE.party.find(x => x.uid === m.uid);
    const hpFull = m.hp >= m.maxHp;
    const disabled = item.effect.toLowerCase().includes('heal') && hpFull;

    const row = document.createElement('div');
    row.style.cssText = `display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:5px;
      border-radius:6px;border:1px solid ${disabled ? '#222' : el.color};
      background:${el.bg};opacity:${disabled ? 0.4 : 1};cursor:${disabled ? 'not-allowed' : 'pointer'};`;

    row.innerHTML = `<span style="font-size:20px">${m.emoji}</span>
      <div style="flex:1">
        <span style="color:${el.color};font-size:17px">${m.name}</span>
        <span style="color:var(--dim);font-size:14px"> Lv.${m.level}${inParty ? '' : ' [bench]'}</span>
        <div style="font-size:13px;color:${m.hp < m.maxHp ? '#ff6b6b' : 'var(--dim)'}">HP ${m.hp}/${m.maxHp}</div>
      </div>
      ${disabled ? '<span style="font-size:13px;color:#444">FULL</span>' : ''}`;

    if (!disabled) {
      row.addEventListener('click', () => doUseItem(idx, m.uid));
    }
    box.appendChild(row);
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.cssText = 'margin-top:10px;background:transparent;border:1px solid #333;color:var(--dim);font-family:"VT323",monospace;font-size:18px;padding:5px 16px;border-radius:5px;cursor:pointer;';
  cancelBtn.addEventListener('click', () => overlay.remove());
  box.appendChild(cancelBtn);

  overlay.appendChild(box);
  // Click outside box to dismiss
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function doUseItem(idx, monUid) {
  document.getElementById('use-item-overlay')?.remove();
  const item = STATE.inventory[idx];
  if (!item) return;

  const applyTo = (arr) => arr.map(m => {
    if (m.uid !== monUid) return m;
    // ── Plants: 25% MaxHP & MP; matching element = 35% ──
    const plant = PLANT_TYPES.find(p => p.id === item.id);
    if (plant) {
      const pct = m.element === plant.element ? 0.35 : 0.25;
      return { ...m,
        hp: Math.min(m.maxHp, m.hp + Math.ceil(m.maxHp * pct)),
        mp: Math.min(m.maxMp, m.mp + Math.ceil(m.maxMp * pct)),
      };
    }
    // ── Minerals ──
    if (item.effect.includes('+5 MaxHP'))    return { ...m, maxHp: m.maxHp+5, hp: Math.min(m.hp+5, m.maxHp+5) };
    if (item.effect.includes('+5 DEF'))      return { ...m, def: m.def+5 };
    return m;
  });

  STATE.party = applyTo(STATE.party);
  STATE.bench = applyTo(STATE.bench);
  STATE.inventory.splice(idx, 1);
  const mon = [...STATE.party, ...STATE.bench].find(m => m.uid === monUid);
  const plant = PLANT_TYPES.find(p => p.id === item.id);
  const healDesc = plant
    ? (mon && mon.element === plant.element ? '+35% HP & MP' : '+25% HP & MP')
    : item.effect;
  toast(`Used ${item.emoji} ${item.name} on ${mon?.emoji||''} ${mon?.name||''} — ${healDesc}`);
  renderInvGrid();
  renderPartyList();
}

function promptBreakdown(idx) {
  const item = STATE.inventory[idx];
  if (!item) return;
  document.getElementById('use-item-overlay')?.remove();

  const plant   = PLANT_TYPES.find(p => p.id === item.id);
  const mineral = !plant && MINERAL_TYPES.find(m => m.id === item.id);
  const recipe  = !plant && !mineral && (CRAFT_RECIPES.find(r => r.itemId === item.id) || TECH_RECIPES.find(r => r.itemId === item.id) || COMPONENT_RECIPES.find(r => r.itemId === item.id));

  const overlay = document.createElement('div');
  overlay.id = 'use-item-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#000000bb;z-index:300;display:flex;align-items:center;justify-content:center;';

  const box = document.createElement('div');
  box.style.cssText = 'background:var(--panel);border:2px solid #ff6b2a;border-radius:12px;padding:22px 24px;min-width:250px;max-width:90vw;font-family:"VT323",monospace;text-align:center;';

  const title = document.createElement('div');
  title.style.cssText = 'font-size:22px;color:#ff9a6a;margin-bottom:4px';
  title.textContent = `⚙ Break Down ${item.emoji} ${item.name}`;
  box.appendChild(title);

  const warn = document.createElement('div');
  warn.style.cssText = 'font-size:15px;color:var(--dim);margin-bottom:14px';
  warn.textContent = 'This will permanently destroy the item.';
  box.appendChild(warn);

  const yieldDiv = document.createElement('div');
  yieldDiv.style.cssText = 'font-size:16px;margin-bottom:16px;background:#0a0a0a;border:1px solid #2a1a00;border-radius:6px;padding:10px';

  if (plant || mineral) {
    const src = plant || mineral;
    const r = ELEMENTAL_RESOURCES[src.element];
    const elData = ELEMENTS[src.element];
    yieldDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;letter-spacing:1px;margin-bottom:6px">YOU WILL RECEIVE:</div>' +
      `<div style="color:${elData.color}">${r.emoji} 1–3x ${r.name}</div>`;
  } else if (recipe) {
    yieldDiv.innerHTML = '<div style="color:var(--dim);font-size:13px;letter-spacing:1px;margin-bottom:6px">YOU WILL RECEIVE:</div>' +
      Object.entries(recipe.cost).map(([el, qty]) => {
        const r = ELEMENTAL_RESOURCES[el];
        const elData = ELEMENTS[el];
        return `<div style="color:${elData.color};margin-bottom:3px">${r.emoji} ${qty}x ${r.name}</div>`;
      }).join('');
  } else {
    yieldDiv.innerHTML = '<div style="color:var(--dim);font-size:14px">No recipe — nothing will be recovered.</div>';
  }
  box.appendChild(yieldDiv);

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;justify-content:center';

  if (plant || mineral || recipe) {
    const confirmBtn = document.createElement('button');
    confirmBtn.textContent = '⚙ Confirm Breakdown';
    confirmBtn.style.cssText = 'background:#1a0800;border:2px solid #ff6b2a;color:#ff9a6a;font-family:"VT323",monospace;font-size:18px;padding:7px 16px;border-radius:6px;cursor:pointer;';
    confirmBtn.addEventListener('click', () => doBreakdown(idx));
    btnRow.appendChild(confirmBtn);
  }

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.cssText = 'background:transparent;border:1px solid #333;color:var(--dim);font-family:"VT323",monospace;font-size:18px;padding:7px 16px;border-radius:6px;cursor:pointer;';
  cancelBtn.addEventListener('click', () => overlay.remove());
  btnRow.appendChild(cancelBtn);

  box.appendChild(btnRow);
  overlay.appendChild(box);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

function doBreakdown(idx) {
  document.getElementById('use-item-overlay')?.remove();
  const item = STATE.inventory[idx];
  if (!item) return;

  const plant   = PLANT_TYPES.find(p => p.id === item.id);
  const mineral = !plant && MINERAL_TYPES.find(m => m.id === item.id);

  if (plant || mineral) {
    const src = plant || mineral;
    const qty = 1 + Math.floor(Math.random() * 3); // 1–3
    STATE.resources[src.element] = (STATE.resources[src.element] || 0) + qty;
    STATE.inventory.splice(idx, 1);
    const r = ELEMENTAL_RESOURCES[src.element];
    toast(`Broke down ${item.emoji} ${item.name} → ${r.emoji} ${qty}x ${r.name}`);
    renderInvGrid();
    return;
  }

  const recipe = CRAFT_RECIPES.find(r => r.itemId === item.id)
    || TECH_RECIPES.find(r => r.itemId === item.id)
    || COMPONENT_RECIPES.find(r => r.itemId === item.id);
  if (!recipe) return;
  Object.entries(recipe.cost).forEach(([el, qty]) => {
    STATE.resources[el] = (STATE.resources[el] || 0) + qty;
  });
  STATE.inventory.splice(idx, 1);
  const gains = Object.entries(recipe.cost).map(([el, qty]) => `${ELEMENTAL_RESOURCES[el].emoji}${qty}`).join(' ');
  toast(`Broke down ${item.emoji} ${item.name} → ${gains}`);
  renderInvGrid();
}

let activeRuinsTab = 'main';

function enterRuins() {
  showScreen('ruins');
  renderRuins();
}

function getRuinsKey() { return `${STATE.pos.r},${STATE.pos.c}`; }

function getRuinsState() {
  const key = getRuinsKey();
  if (!STATE.ruins[key]) {
    STATE.ruins[key] = { bossDefeated: false, rebuildStep: 0, facilities: [], relicView: 'buy' };
  }
  return STATE.ruins[key];
}

function switchRuinsTab(tab) {
  activeRuinsTab = tab;
  ['main','inn','tech','stable','relic','shrine'].forEach(t => {
    const el = document.getElementById(`ruins-tab-${t}`);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'tech')   renderWorkshopInto('ruins-tab-tech');
  if (tab === 'stable') renderRuinsStableTab();
  if (tab === 'inn')    renderInnTab('ruins-tab-inn', 'ruinsInnRest');
  if (tab === 'relic')  renderRelicShop();
  if (tab === 'shrine') renderMonsterShrine();
  if (tab === 'main')   renderRuinsMain();
}

function ruinsInnRest(hours) { doInnRest(hours, renderRuins); }

function renderRuins() {
  const key = getRuinsKey();
  const rd = RUINS_DATA[key];
  const rs = getRuinsState();
  const name = TILE_NAMES[key] || rd?.bossName || 'Ruins';
  document.getElementById('ruins-title').textContent = `⛩ ${name}`;

  // Build tab bar based on state
  const tabBar = document.getElementById('ruins-tab-bar');
  const tabs = [{ id:'main', label:'⛩ Overview' }];
  if (rs.bossDefeated && rs.rebuildStep >= 3) {
    if (rs.facilities.includes('inn'))      tabs.push({ id:'inn',    label:'🏨 Inn' });
    if (rs.facilities.includes('workshop')) tabs.push({ id:'tech',   label:'⚙️ Workshop' });
    if (rs.facilities.includes('stable'))   tabs.push({ id:'stable', label:'🐴 Stable' });
    if (rs.facilities.includes('relic'))    tabs.push({ id:'relic',  label:'🏺 Relic' });
    if (rs.facilities.includes('shrine'))   tabs.push({ id:'shrine', label:'🔮 Shrine' });
  }
  tabBar.innerHTML = tabs.map(t =>
    `<button class="nav-btn" onclick="switchRuinsTab('${t.id}')">${t.label}</button>`
  ).join('');

  switchRuinsTab('main');
}

function renderRuinsMain() {
  const key = getRuinsKey();
  const rd = RUINS_DATA[key];
  const rs = getRuinsState();
  const tab = document.getElementById('ruins-tab-main');
  if (!rd) {
    tab.innerHTML = `<div style="color:var(--dim);font-size:16px">Nothing of note here.</div>`;
    return;
  }
  const el = ELEMENTS[rd.bossId === 'stonewarden' ? 'earth' : 'shadow'];

  if (!rs.bossDefeated) {
    // Pre-boss view
    tab.innerHTML = `
      <div style="text-align:center;padding:20px 0 10px">
        <div style="font-size:64px;margin-bottom:8px">${rd.bossEmoji}</div>
        <div style="font-size:24px;color:${el.color};margin-bottom:6px">${rd.bossName}</div>
        <div style="font-size:15px;color:var(--dim);margin-bottom:6px">Tier ${rd.tier} Boss · Lv.${rd.bossLevel}</div>
        <div style="font-size:15px;color:#aaa;margin-bottom:20px;font-style:italic">"${rd.flavorText}"</div>
        <div style="font-size:14px;color:var(--dim);margin-bottom:16px;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:12px">
          <div style="color:var(--gold);font-size:15px;margin-bottom:8px">⚔ Victory Rewards</div>
          <div>💰 ${rd.rewardGold}g</div>
          <div>${rd.bossEmoji} ${rd.bossName} joins your party</div>
          <div>✨ Rare recruit: ${MONSTER_TYPES.find(m=>m.id===rd.rewardRecruit)?.emoji} ${MONSTER_TYPES.find(m=>m.id===rd.rewardRecruit)?.name}</div>
          <div>${TECH_ITEMS.find(t=>t.id===rd.rewardItem)?.emoji} ${TECH_ITEMS.find(t=>t.id===rd.rewardItem)?.name} (rare tech)</div>
        </div>
        <button onclick="challengeBoss()" style="background:#1a0818;border:2px solid ${el.color};color:${el.color};font-family:'VT323',monospace;font-size:22px;padding:12px 32px;border-radius:8px;cursor:pointer;width:100%;max-width:300px">
          ⚔ Challenge ${rd.bossName}
        </button>
      </div>`;
    return;
  }

  if (rs.rebuildStep < 3) {
    // Rebuild quest view
    const step = rd.rebuildSteps[rs.rebuildStep];
    const resCost = Object.entries(step.resourceCost);
    const canAffordGold = STATE.gold >= step.goldCost;
    const canAffordRes  = resCost.every(([el, qty]) => (STATE.resources[el]||0) >= qty);
    const canAffordMin  = step.mineralCost === 0 || STATE.inventory.filter(i => MINERAL_TYPES.find(m=>m.id===i.id)).length >= step.mineralCost;
    const canAfford = canAffordGold && canAffordRes && canAffordMin;
    const progressHtml = rd.rebuildSteps.map((s, i) => {
      const done = i < rs.rebuildStep;
      const active = i === rs.rebuildStep;
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;margin-bottom:4px;border-radius:6px;border:1px solid ${done?'#2aff7a':active?el.color:'#222'};background:${done?'#0a1a0a':active?el.bg:'#0a0a0a'}">
        <span style="font-size:18px">${done?'✅':active?'🔨':'○'}</span>
        <span style="color:${done?'#2aff7a':active?el.color:'#555'};font-size:16px">${s.label}</span>
      </div>`;
    }).join('');
    const resCostHtml = resCost.map(([elKey, qty]) => {
      const r = ELEMENTAL_RESOURCES[elKey];
      const have = STATE.resources[elKey]||0;
      const ok = have >= qty;
      return `<span style="color:${ok?ELEMENTS[elKey].color:'#ff3a3a'};margin-right:8px">${r.emoji}${qty}${ok?'':` (${have})`}</span>`;
    }).join('');

    tab.innerHTML = `
      <div style="font-size:14px;color:var(--dim);margin-bottom:14px">The boss has been defeated. Rebuild this ruin into a stronghold.</div>
      <div style="margin-bottom:16px">${progressHtml}</div>
      <div style="background:#0a0a0a;border:1px solid ${el.color}44;border-radius:8px;padding:14px;margin-bottom:14px">
        <div style="color:${el.color};font-size:17px;margin-bottom:8px">🔨 ${step.label}</div>
        <div style="font-size:14px;color:var(--dim);margin-bottom:6px">Cost:</div>
        <div style="font-size:15px;margin-bottom:4px;color:${canAffordGold?'var(--gold)':'#ff3a3a'}">💰 ${step.goldCost}g ${canAffordGold?'':` (have ${STATE.gold}g)`}</div>
        ${resCostHtml ? `<div style="font-size:15px;margin-bottom:4px">${resCostHtml}</div>` : ''}
        ${step.mineralCost > 0 ? `<div style="font-size:15px;color:${canAffordMin?'var(--text)':'#ff3a3a'}">⬛ ${step.mineralCost}x any mineral ${canAffordMin?'':` (have ${STATE.inventory.filter(i=>MINERAL_TYPES.find(m=>m.id===i.id)).length})`}</div>` : ''}
      </div>
      <button onclick="doRebuildStep()" ${canAfford?'':'disabled'}
        style="width:100%;background:${canAfford?el.bg:'#111'};border:2px solid ${canAfford?el.color:'#333'};color:${canAfford?el.color:'#555'};font-family:'VT323',monospace;font-size:20px;padding:10px;border-radius:8px;cursor:${canAfford?'pointer':'not-allowed'}">
        ${canAfford ? `🔨 ${step.label}` : 'Not enough resources'}
      </button>`;
    return;
  }

  // Fully rebuilt — base building view
  const builtFacilities = rs.facilities;
  const maxFacilities = 3;
  const availableToBuild = RUIN_FACILITIES.filter(f => !builtFacilities.includes(f.id));
  const facilityCards = availableToBuild.map(f => {
    const resCost = Object.entries(f.resourceCost);
    const canAffordGold = STATE.gold >= f.goldCost;
    const canAffordRes  = resCost.every(([elKey, qty]) => (STATE.resources[elKey]||0) >= qty);
    const canAfford = canAffordGold && canAffordRes;
    const full = builtFacilities.length >= maxFacilities;
    const costHtml = resCost.map(([elKey, qty]) => {
      const r = ELEMENTAL_RESOURCES[elKey];
      const have = STATE.resources[elKey]||0;
      return `<span style="color:${have>=qty?ELEMENTS[elKey].color:'#ff3a3a'};margin-right:6px">${r.emoji}${qty}</span>`;
    }).join('');
    return `<div class="panel-box" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1">
          <div style="font-size:18px;color:var(--text)">${f.label}</div>
          <div style="font-size:13px;color:var(--dim)">${f.desc}</div>
          <div style="font-size:14px;margin-top:4px">
            <span style="color:${canAffordGold?'var(--gold)':'#ff3a3a'};margin-right:8px">💰${f.goldCost}g</span>${costHtml}
          </div>
        </div>
        <button onclick="buildFacility('${f.id}')" ${(!canAfford||full)?'disabled':''}
          style="background:${canAfford&&!full?'#0a1a10':'#111'};border:1px solid ${canAfford&&!full?'var(--accent)':'#333'};color:${canAfford&&!full?'var(--accent)':'#555'};font-family:'VT323',monospace;font-size:16px;padding:6px 12px;border-radius:5px;cursor:${canAfford&&!full?'pointer':'not-allowed'}">
          Build
        </button>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--dim);font-size:15px">All available facilities built.</div>';

  const builtList = builtFacilities.length === 0
    ? '<div style="color:var(--dim);font-size:14px">No facilities yet.</div>'
    : builtFacilities.map(id => {
        const f = RUIN_FACILITIES.find(x => x.id === id);
        return `<div style="font-size:15px;color:#2aff7a;margin-bottom:3px">✅ ${f?.label || id}</div>`;
      }).join('');

  tab.innerHTML = `
    <div style="font-size:14px;color:#2aff7a;margin-bottom:12px">✅ Ruin fully rebuilt! Choose up to ${maxFacilities} facilities to construct.</div>
    <div style="background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:10px;margin-bottom:14px">
      <div style="font-size:13px;color:var(--dim);margin-bottom:6px">BUILT (${builtFacilities.length}/${maxFacilities})</div>
      ${builtList}
    </div>
    ${builtFacilities.length < maxFacilities ? `
      <div style="font-size:14px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">BUILD FACILITY</div>
      ${facilityCards}
    ` : '<div style="color:var(--dim);font-size:15px">Maximum facilities reached (3/3).</div>'}`;
}

function challengeBoss() {
  const key = getRuinsKey();
  const rd = RUINS_DATA[key];
  if (!rd) return;
  const rs = getRuinsState();
  if (rs.bossDefeated) return;
  // Build boss team (3 monsters scaled to boss level)
  const bossType = MONSTER_TYPES.find(m => m.id === rd.bossId);
  const boss = makeMonster(rd.bossId, rd.bossLevel);
  // Add 2 escort monsters (wild monsters from ruins tile, half boss level)
  const escortPool = TILE_DATA.ruins.monsters;
  const escortLevel = Math.max(1, Math.floor(rd.bossLevel * 0.6));
  const escort1 = makeMonster(escortPool[Math.floor(Math.random()*escortPool.length)], escortLevel);
  const escort2 = makeMonster(escortPool[Math.floor(Math.random()*escortPool.length)], escortLevel);
  STATE.battleEnemies = [boss, escort1, escort2];
  STATE.encounter = { type: 'boss', key, rd, rs };
  startBattle();
}

function onBossDefeated(key) {
  const rd = RUINS_DATA[key];
  const rs = STATE.ruins[key];
  if (!rd || !rs || rs.bossDefeated) return;
  rs.bossDefeated = true;

  // Gold reward
  STATE.gold += rd.rewardGold;

  // Rare tech item
  const rewardTech = TECH_ITEMS.find(t => t.id === rd.rewardItem);
  if (rewardTech) STATE.inventory.push({ ...rewardTech });

  // Boss joins party/bench
  const bossType = MONSTER_TYPES.find(m => m.id === rd.bossId);
  if (bossType) {
    const bossMon = makeMonster(rd.bossId, rd.bossLevel);
    if (STATE.party.length < 6) STATE.party.push(bossMon);
    else STATE.bench.push(bossMon);
  }

  // Rare recruitable monster available
  const recruitType = MONSTER_TYPES.find(m => m.id === rd.rewardRecruit);
  const recruitMon = recruitType ? makeMonster(rd.rewardRecruit, Math.max(1, rd.bossLevel - 5)) : null;

  updateGold();
  renderPartyList();

  // Show victory overlay
  const overlay = document.createElement('div');
  overlay.id = 'use-item-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#000000cc;z-index:300;display:flex;align-items:center;justify-content:center;';
  const box = document.createElement('div');
  box.style.cssText = 'background:var(--panel);border:2px solid var(--gold);border-radius:12px;padding:24px;max-width:92vw;font-family:"VT323",monospace;text-align:center;';
  box.innerHTML = `
    <div style="font-size:40px;margin-bottom:6px">${rd.bossEmoji}</div>
    <div style="font-size:26px;color:var(--gold);margin-bottom:4px">${rd.bossName} Defeated!</div>
    <div style="font-size:16px;color:var(--dim);margin-bottom:16px">The ruin falls silent. You may now rebuild.</div>
    <div style="background:#0a0a0a;border:1px solid #2a2a0a;border-radius:8px;padding:12px;margin-bottom:16px;text-align:left">

function recruitBossReward(key, typeId, bossLevel) {

function doRebuildStep() {
  const key = getRuinsKey();
  const rd = RUINS_DATA[key];
  const rs = getRuinsState();
  if (!rd || !rs.bossDefeated || rs.rebuildStep >= 3) return;
  const step = rd.rebuildSteps[rs.rebuildStep];
  if (STATE.gold < step.goldCost) return;
  const resCost = Object.entries(step.resourceCost);
  if (!resCost.every(([el, qty]) => (STATE.resources[el]||0) >= qty)) return;
  const mineralItems = STATE.inventory.filter(i => MINERAL_TYPES.find(m => m.id === i.id));
  if (step.mineralCost > 0 && mineralItems.length < step.mineralCost) return;

  STATE.gold -= step.goldCost;
  resCost.forEach(([el, qty]) => { STATE.resources[el] -= qty; });
  if (step.mineralCost > 0) {
    let toRemove = step.mineralCost;
    STATE.inventory = STATE.inventory.filter(i => {
      if (toRemove > 0 && MINERAL_TYPES.find(m => m.id === i.id)) { toRemove--; return false; }
      return true;
    });
  }
  rs.rebuildStep++;
  updateGold();
  toast(rs.rebuildStep >= 3 ? '🏛 Ruin fully rebuilt!' : `🔨 ${step.label} complete!`);
  renderRuins();
}

function buildFacility(facilityId) {
  const key = getRuinsKey();
  const rs = getRuinsState();
  if (rs.facilities.length >= 3 || rs.facilities.includes(facilityId)) return;
  const f = RUIN_FACILITIES.find(x => x.id === facilityId);
  if (!f) return;
  if (STATE.gold < f.goldCost) return;
  const resCost = Object.entries(f.resourceCost);
  if (!resCost.every(([el, qty]) => (STATE.resources[el]||0) >= qty)) return;
  STATE.gold -= f.goldCost;
  resCost.forEach(([el, qty]) => { STATE.resources[el] -= qty; });
  rs.facilities.push(facilityId);
  updateGold();
  toast(`${f.label} built!`);
  renderRuins();
}

function buyRelicItem(stockIdx) {
  const key = getRuinsKey();
  const rd = RUINS_DATA[key];
  const tier = rd?.tier || 1;
  const item = RELIC_STOCK[tier]?.[stockIdx];
  if (!item) return;
  const buyPrice = Math.ceil(item.value * 1.5);
  if (STATE.gold < buyPrice) return;
  STATE.gold -= buyPrice;
  STATE.inventory.push({ ...item });
  updateGold();
  toast(`Bought ${item.emoji} ${item.name}!`);
  renderRelicShop();
}

function sellRelicItem(rawIdx) {
  const item = STATE.inventory[rawIdx];
  if (!item || !item.value) return;
  const sp = Math.floor(item.value * 0.6);
  STATE.gold += sp;
  STATE.inventory.splice(rawIdx, 1);
  updateGold();
  toast(`Sold ${item.emoji} ${item.name} for ${sp}g.`);
  renderRelicShop();
}

function craftTech(recipeIdx) {
  const recipe = TECH_RECIPES[recipeIdx];
  if (!recipe) return;
  const hasResources = Object.entries(recipe.cost).every(([el, qty]) => (STATE.resources[el]||0) >= qty);
  const mineralInInv = STATE.inventory.filter(i => i.id === recipe.mineral).length;
  const hasMinerals  = mineralInInv >= recipe.mineralQty;
  if (!hasResources || !hasMinerals) return;
  const stackCount = STATE.inventory.filter(i => i.id === recipe.itemId).length;
  if (stackCount >= 10) { toast('Stack full! (max 10)'); return; }
  Object.entries(recipe.cost).forEach(([el, qty]) => { STATE.resources[el] -= qty; });
  let toRemove = recipe.mineralQty;
  STATE.inventory = STATE.inventory.filter(i => {
    if (i.id === recipe.mineral && toRemove > 0) { toRemove--; return false; }
    return true;
  });
  const tech = TECH_ITEMS.find(t => t.id === recipe.itemId);
  STATE.inventory.push({ ...tech, slots: [null, null, null] });
  toast(`Crafted ${tech.emoji} ${tech.name}!`);
  renderTechTab();
  renderRanchTechTab();
}

function townInnRest(hours) {

function buyItem(itemId) {
  const all = [...PLANT_TYPES,...MINERAL_TYPES];
  const item = all.find(x=>x.id===itemId);
  if (!item||STATE.gold<item.value) return;
  STATE.gold -= item.value;
  STATE.inventory.push({...item});
  updateGold();
  renderTown();
  toast(`Bought ${item.emoji} ${item.name}!`);
}

function sellItem(idx) {
  const item = STATE.inventory[idx];
  if (!item) return;
  const earned = Math.floor(item.value * 0.6);
  STATE.inventory.splice(idx, 1);
  STATE.gold += earned;
  updateGold();
  renderMerchantTab(); // re-render so the list updates instantly
  toast(`Sold ${item.emoji} ${item.name} for ${earned}g!`);
}

function recruitMon(typeId, cost) {
  if (STATE.gold<cost) return;
  STATE.gold -= cost;
  const mon = makeMonster(typeId, 1);
  if (STATE.party.length<6) STATE.party.push(mon);
  else STATE.bench.push(mon);
  updateGold();
  renderTown();
  toast(`Recruited ${mon.emoji} ${mon.name}!`);
}

function recruitSpecial(tKey, idx, cost) {
  const entry = STATE.trapperInventory[tKey]?.[idx];
  if (!entry || entry.purchased) return;
  if (STATE.gold < cost) return;
  if (STATE.party.length + STATE.bench.length >= 12) return;
  STATE.gold -= cost;
  entry.purchased = true;
  const mon = makeMonster(entry.typeId, 3);
  if (STATE.party.length < 6) STATE.party.push(mon);
  else STATE.bench.push(mon);
  updateGold();
  renderTown();
  toast(`Recruited ${mon.emoji} ${mon.name} (Lv.3)!`);
}

// TIME
// ════════════════════════════════════════════════════════
const TIME = { HOURS_PER_DAY:24, DAYS_PER_WEEK:7, WEEKS_PER_MONTH:4, MONTHS_PER_YEAR:12 };
TIME.HOURS_PER_WEEK  = TIME.HOURS_PER_DAY  * TIME.DAYS_PER_WEEK;
TIME.HOURS_PER_MONTH = TIME.HOURS_PER_WEEK * TIME.WEEKS_PER_MONTH;
TIME.HOURS_PER_YEAR  = TIME.HOURS_PER_MONTH * TIME.MONTHS_PER_YEAR;

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseTime(totalHours) {
  let h = totalHours;
  const year   = Math.floor(h / TIME.HOURS_PER_YEAR)  + 1; h %= TIME.HOURS_PER_YEAR;
  const month  = Math.floor(h / TIME.HOURS_PER_MONTH) + 1; h %= TIME.HOURS_PER_MONTH;
  const week   = Math.floor(h / TIME.HOURS_PER_WEEK)  + 1; h %= TIME.HOURS_PER_WEEK;
  const day    = Math.floor(h / TIME.HOURS_PER_DAY)   + 1;
  const hour   = h % TIME.HOURS_PER_DAY;
  return { year, month, week, day, hour };
}

function formatTime(totalHours) {
  const t = parseTime(totalHours);
  const ampm = t.hour < 12 ? 'AM' : 'PM';
  const hr12 = t.hour % 12 || 12;
  return `Yr ${t.year} · ${MONTH_NAMES[t.month-1]} · Wk ${t.week} · Day ${t.day} · ${hr12}${ampm}`;
}

function generateMerchantStock() {
  const TOWN_TYPES = new Set(["town", "shop"]);
  const mark = item => ({ ...item, buyPrice: Math.ceil(item.value * 1.2) });
  const pick = (arr, min, max) => {
    const shuffled = [...arr].sort(() => Math.random() - 0.5);
    const n = min + Math.floor(Math.random() * (max - min + 1));
    return shuffled.slice(0, Math.min(n, shuffled.length));
  };

  for (let r = 0; r < MAP_TILES.length; r++) {
    for (let c = 0; c < MAP_TILES[r].length; c++) {
      if (!TOWN_TYPES.has(MAP_TILES[r][c])) continue;
      const key = `${r},${c}`;

      // Collect available item types from tiles within 2 steps (Manhattan distance)
      const adjPlants = new Set();
      const adjMinerals = new Set();
      for (let dr = -2; dr <= 2; dr++) {
        for (let dc = -2; dc <= 2; dc++) {
          if (Math.abs(dr) + Math.abs(dc) > 2 || (dr === 0 && dc === 0)) continue;
          const ar = r + dr, ac = c + dc;
          if (ar < 0 || ar >= MAP_TILES.length || ac < 0 || ac >= MAP_TILES[0].length) continue;
          const td = TILE_DATA[MAP_TILES[ar][ac]];
          if (!td || td.safe) continue;
          if (td.plants)   PLANT_TYPES.forEach(p => adjPlants.add(p.id));
          if (td.minerals) MINERAL_TYPES.forEach(m => adjMinerals.add(m.id));
        }
      }

      const eligiblePlants   = PLANT_TYPES.filter(p => adjPlants.has(p.id));
      const eligibleMinerals = MINERAL_TYPES.filter(m => adjMinerals.has(m.id));
      const allEligible = [...eligiblePlants, ...eligibleMinerals];

      // If adjacent tiles yield too few eligible items, pad from the full pool
      const fullPool = [...PLANT_TYPES, ...MINERAL_TYPES];
      const paddedEligible = allEligible.length >= 3 ? allEligible
        : [...new Map([...allEligible, ...fullPool].map(i => [i.id, i])).values()];

      const commons   = paddedEligible.filter(i => i.rarity === 'common');
      const uncommons = paddedEligible.filter(i => i.rarity === 'uncommon');
      const rares     = paddedEligible.filter(i => i.rarity === 'rare');

      STATE.merchantStock[key] = [
        ...pick(commons,   1, 4).map(mark),
        ...pick(uncommons, 1, 3).map(mark),
        ...pick(rares,     0, 2).map(mark),
      ].slice(0, 9);
    }
  }
}

function advanceTime() {
  const prev = STATE.time;
  STATE.time += 1;
  const now  = STATE.time;
  updateClock();
  processStableTime();

  const prevT = parseTime(prev);
  const nowT  = parseTime(now);

  // ── New month → restock merchant ──
  if (nowT.month !== prevT.month || now === 1) {
    generateMerchantStock();
    stableNotify('🏪 The Merchant has restocked their wares!', '#ffd84a');
    // Re-render merchant if currently open
    const inMerchant = document.getElementById('town-screen').classList.contains('active') && activeTownTab === 2;
    if (inMerchant) renderMerchantTab();
  }

  // ── Start of week 4 → items changing soon warning ──
  if (nowT.week === 4 && nowT.day === 1 && nowT.hour === 0) {
    stableNotify('🏪 Merchant stock changes at end of month!', '#ffd84a');
  }
}

function updateClock() {
  const el = document.getElementById('clock-display');
  if (el) el.textContent = formatTime(STATE.time);
}

function stableNotify(msg, color) {
  const container = document.getElementById('stable-notifs');
  const el = document.createElement('div');
  el.className = 'stable-notif';
  if (color) el.style.borderColor = color + '88';
  el.textContent = msg;
  container.appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => el.classList.add('show')); });
  setTimeout(() => {
    el.classList.remove('show');
    el.classList.add('fade');
    setTimeout(() => el.remove(), 400);
  }, 4000);
  const all = container.querySelectorAll('.stable-notif');
  if (all.length > 4) all[0].remove();
}

function getStableKey() {
  return `${STATE.pos.r},${STATE.pos.c}`;
}

function getActiveStable() {
  const key = getStableKey();
  if (!STATE.stables[key]) STATE.stables[key] = [];
  return STATE.stables[key];
}

function processStableTime() {
  // Called every hour. Processes ALL stables regardless of location.
  const allStabled = Object.values(STATE.stables).flat();
  if (allStabled.length === 0) return;
  const now = STATE.time;
  const inRanchStable = document.getElementById('ranch-screen')?.classList.contains('active') && activeRanchTab === 2;
  const inRuinsStable = document.getElementById('ruins-screen')?.classList.contains('active') && activeRuinsTab === 2;
  let needsRender = false;

  Object.values(STATE.stables).forEach(stableArr => {
    stableArr.forEach(m => {
      const elData = ELEMENTS[m.element];

      if (m.mp < m.maxMp) {
        const mpPerHour = Math.max(1, Math.floor(m.int / 10));
        const prevFull = m.mp >= m.maxMp;
        m.mp = Math.min(m.maxMp, m.mp + mpPerHour);
        if (!prevFull && m.mp >= m.maxMp) stableNotify(`${m.emoji} ${m.name} MP fully restored!`, elData.color);
        needsRender = true;
      }

      const dayNow  = Math.floor(now / TIME.HOURS_PER_DAY);
      const dayPrev = Math.floor((now - 1) / TIME.HOURS_PER_DAY);
      if (dayNow !== dayPrev && m.hp < m.maxHp) {
        const hpPerDay = Math.max(1, Math.floor(m.def / 8));
        const prevFull = m.hp >= m.maxHp;
        m.hp = Math.min(m.maxHp, m.hp + hpPerDay);
        if (!prevFull && m.hp >= m.maxHp) stableNotify(`${m.emoji} ${m.name} HP fully restored!`, elData.color);
        needsRender = true;
      }

      const weekNow  = Math.floor(now / TIME.HOURS_PER_WEEK);
      const weekPrev = Math.floor((now - 1) / TIME.HOURS_PER_WEEK);
      if (weekNow !== weekPrev) {
        const prodChance = Math.min(0.9, m.level * 0.10);
        if (m.hp >= m.maxHp && Math.random() < prodChance) {
          const qty = 1 + Math.floor(Math.random() * 2);
          STATE.resources[m.element] = (STATE.resources[m.element] || 0) + qty;
          const r = ELEMENTAL_RESOURCES[m.element];
          stableNotify(`${m.emoji} ${m.name} produced ${qty}x ${r.emoji} ${r.name}!`, elData.color);
          needsRender = true;
        }
      }
    });
  });

  if (needsRender && inRanchStable) renderRanchStableTab();
  if (needsRender && inRuinsStable) renderRuinsStableTab();
}

        const mpFull = m.mp >= m.maxMp;
        const r = ELEMENTAL_RESOURCES[m.element];
        const mpPerHour = Math.max(1, Math.floor(m.int / 10));
        const hpPerDay  = Math.max(1, Math.floor(m.def / 8));

            <div style="flex:1">
              <div style="color:${el.color};font-size:19px">${m.name} <span style="color:var(--dim);font-size:13px">Lv.${m.level}</span></div>

            </div>
            <button onclick="removeFromStable('${m.uid}')" style="background:#1a0a00;border:1px solid #ff6b2a;color:#ff9a6a;font-family:'VT323',monospace;font-size:15px;padding:4px 10px;border-radius:4px;cursor:pointer">← Retrieve</button>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-bottom:2px">
            <span style="color:var(--dim)">HP</span>
            <span style="color:${hpCol}">${m.hp}/${m.maxHp} ${hpFull ? '✓ Full' : `+${hpPerDay}/day`}</span>
          </div>
          <div class="bar-wrap" style="margin-bottom:6px"><div class="bar-fill" style="width:${hpPct}%;background:${hpCol}"></div></div>
          <div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;margin-bottom:2px">
            <span style="color:var(--dim)">MP</span>
            <span style="color:#60a5fa">${m.mp}/${m.maxMp} ${mpFull ? '✓ Full' : `+${mpPerHour}/hr`}</span>
          </div>
          <div class="bar-wrap" style="margin-bottom:6px"><div class="bar-fill" style="width:${mpPct}%;background:#60a5fa"></div></div>
          <div style="font-size:13px;color:${hpFull ? el.color : 'var(--dim)'};margin-top:4px">
            ${hpFull ? `✨ ${r.emoji} ${r.name} · ${prodChance}% chance per week (Lv.${m.level})` : `⏳ Needs full HP to produce resources`}
          </div>
        </div>`;
      }).join('');

  const rosterCards = allMons.filter(m => !stabledEverywhere.has(m.uid)).map(m => {
    const el = ELEMENTS[m.element];
    const inParty = !!STATE.party.find(x => x.uid === m.uid);
    const partyTooSmall = inParty && STATE.party.length <= 1;
    return `<div class="panel-box" style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:24px">${m.emoji}</span>
      <div style="flex:1">
        <div style="color:${el.color};font-size:17px">${m.name} <span style="color:var(--dim);font-size:13px">Lv.${m.level}${inParty ? ' [party]' : ' [bench]'}</span></div>
        <div style="font-size:13px;color:${m.hp < m.maxHp ? '#ff6b6b' : 'var(--dim)'}">HP ${m.hp}/${m.maxHp} · MP ${m.mp}/${m.maxMp}</div>
      </div>
      <button onclick="addToStable('${m.uid}')" ${partyTooSmall ? 'disabled' : ''}
        style="background:#0a1a10;border:1px solid ${partyTooSmall ? '#333' : 'var(--accent)'};color:${partyTooSmall ? '#333' : 'var(--accent)'};font-family:'VT323',monospace;font-size:15px;padding:4px 10px;border-radius:4px;cursor:${partyTooSmall ? 'not-allowed' : 'pointer'}"
        title="${partyTooSmall ? 'Party must have at least 1 member' : ''}">
        → Stable

  }).join('') || '<div style="color:var(--dim);font-size:15px">All monsters are stabled elsewhere.</div>';

  tab.innerHTML = `
    <div style="font-size:18px;color:var(--dim);margin-bottom:6px">Leave monsters to rest and recover. Full-health monsters may produce elemental resources weekly.</div>
    <div style="font-size:13px;color:var(--dim);margin-bottom:14px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:7px 10px">
      🕰 ${formatTime(STATE.time)}&nbsp;&nbsp;·&nbsp;&nbsp;MP +INT/10 per move&nbsp;&nbsp;·&nbsp;&nbsp;HP +DEF/8 per day&nbsp;&nbsp;·&nbsp;&nbsp;Resources: Level×10% per week
    </div>
    <div style="font-size:14px;color:var(--accent);letter-spacing:2px;margin-bottom:8px">IN STABLE (${stableArr.length})</div>
    ${stableCards}
    <div style="font-size:14px;color:var(--accent);letter-spacing:2px;margin:14px 0 8px">YOUR ROSTER</div>

function addToStable(uid) {
  const allMons = [...STATE.party, ...STATE.bench];
  const m = allMons.find(x => x.uid === uid);
  if (!m) return;
  const inParty = !!STATE.party.find(x => x.uid === uid);
  if (inParty && STATE.party.length <= 1) return;
  if (inParty) STATE.party = STATE.party.filter(x => x.uid !== uid);
  else STATE.bench = STATE.bench.filter(x => x.uid !== uid);
  const key = getStableKey();
  if (!STATE.stables[key]) STATE.stables[key] = [];
  STATE.stables[key].push(m);
  renderRanchStableTab();
  renderRuinsStableTab();
  renderPartyList();
}

function removeFromStable(uid) {
  const key = getStableKey();
  const stableArr = STATE.stables[key] || [];
  const m = stableArr.find(x => x.uid === uid);
  if (!m) return;
  STATE.stables[key] = stableArr.filter(x => x.uid !== uid);
  STATE.party = STATE.party.filter(x => x.uid !== uid);
  STATE.bench = STATE.bench.filter(x => x.uid !== uid);
  STATE.bench.push(m);
  renderRanchStableTab();
  renderRuinsStableTab();
  renderPartyList();
  toast(`${m.emoji} ${m.name} retrieved from stable.`);
}

function updateLastBattleBtn() {
  const btn = document.getElementById('last-battle-btn');
  if (!btn) return;
  const hasLog = STATE.lastBattleLog.length > 0;
  const isVictory = STATE.lastBattleResult === 'victory';
  btn.disabled = !hasLog;
  btn.style.opacity = hasLog ? '1' : '0.35';
  btn.style.cursor = hasLog ? 'pointer' : 'not-allowed';
  btn.style.borderColor = hasLog ? (isVictory ? 'var(--accent)' : 'var(--danger)') : '#4a4a7a';
  btn.style.color = hasLog ? (isVictory ? 'var(--accent)' : 'var(--danger)') : '#8888bb';
  btn.textContent = hasLog
    ? (isVictory ? '📜 LAST BATTLE — Victory' : '📜 LAST BATTLE — Defeat')
    : '📜 LAST BATTLE';
}

function showLastBattleLog() {
  if (!STATE.lastBattleLog.length) return;
  const existing = document.getElementById('last-battle-overlay');
  if (existing) existing.remove();

  const isVictory = STATE.lastBattleResult === 'victory';
  const overlay = document.createElement('div');
  overlay.id = 'last-battle-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:#000000cc;z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;';

  const box = document.createElement('div');
  box.style.cssText = `background:var(--panel);border:2px solid ${isVictory ? 'var(--accent)' : 'var(--danger)'};border-radius:12px;padding:18px 20px;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;font-family:'VT323',monospace;`;

  const header = document.createElement('div');
  header.style.cssText = `display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;`;
  header.innerHTML = `
    <span style="font-size:20px;color:${isVictory ? 'var(--accent)' : 'var(--danger)'}">
      📜 LAST BATTLE — ${isVictory ? '⚔ VICTORY' : '💀 DEFEAT'}
    </span>
    <button onclick="document.getElementById('last-battle-overlay').remove()"
      style="background:#1a0000;border:1px solid #ff3a3a;color:#ff6b6b;font-family:'VT323',monospace;font-size:18px;padding:2px 12px;border-radius:5px;cursor:pointer;">✕</button>`;

  const logEl = document.createElement('div');
  logEl.style.cssText = 'overflow-y:auto;flex:1;font-size:15px;line-height:1.6;';
  logEl.innerHTML = STATE.lastBattleLog.map(line => {
    const col = line.includes('💀') ? '#ff6b6b'
              : line.includes('💥') ? '#ffd84a'
              : line.includes('💎') ? '#a78bfa'
              : line.includes('❤')  ? '#2aff7a'
              : 'var(--dim)';
    return `<div style="color:${col};border-bottom:1px solid #111;padding:3px 0">${line}</div>`;
  }).join('');

  box.appendChild(header);
  box.appendChild(logEl);
  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
renderMap();
renderMapSide();
updateTownBtn();
updateDpadVisibility();
updateClock();
generateMerchantStock();
</script>
