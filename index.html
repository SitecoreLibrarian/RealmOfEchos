<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Echoes</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --panel: #0d1520;
    --border: #1e3a2a;
    --accent: #2aff7a;
    --accent2: #ff6b2a;
    --accent3: #2ab8ff;
    --gold: #ffd84a;
    --text: #c8e8d0;
    --dim: #4a6a50;
    --danger: #ff3a3a;
    --shadow-el: #c084fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TITLE BAR ── */
  #titlebar {
    background: #060a0e;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 14px;
    height: 38px;
    flex-shrink: 0;
  }
  #titlebar .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  #titlebar .gold-disp { color: var(--gold); margin-left: auto; font-size: 20px; }
  .nav-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 17px;
    padding: 3px 12px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .nav-btn:hover, .nav-btn.active { border-color: var(--accent); color: var(--accent); }

  /* ── SCREENS ── */
  .screen { display: none; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* ══════════════════════════════════
     MAP SCREEN — Desktop
  ══════════════════════════════════ */
  #map-screen { flex-direction: row; overflow: hidden; }

  #map-grid-wrap {
    padding: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #map-grid {
    display: grid;
    grid-template-columns: repeat(8, 46px);
    grid-template-rows: repeat(8, 46px);
    gap: 3px;
    flex-shrink: 0;
  }
  .tile {
    width: 46px; height: 46px;
    border: 1px solid #0e1e14;
    border-radius: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 17px;
    cursor: pointer;
    position: relative;
    transition: border-color .1s;
    user-select: none;
  }
  .tile:hover { border-color: #2a6a40; }
  .tile.player { border-color: var(--accent) !important; box-shadow: 0 0 10px var(--accent); }
  .tile .tile-label { font-size: 7px; color: #3a5a40; margin-top: 1px; font-family: 'VT323', monospace; line-height: 1.1; text-align: center; }
  .tile .tile-name  { font-size: 6px; color: #2a7a50; font-family: 'VT323', monospace; line-height: 1.1; text-align: center; }
  .tile .player-dot { font-size: 18px; position: absolute; }

  #dpad {
    display: grid;
    grid-template: 36px 36px 36px / 36px 36px 36px;
    gap: 3px;
    flex-shrink: 0;
  }
  .dpad-btn {
    background: #0d1a10;
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s;
  }
  .dpad-btn:hover { background: #1a3a20; }

  #map-side {
    flex: 1;
    border-left: 2px solid var(--border);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }

  /* floating dpad hidden on desktop */
  #dpad-float { display: none; }

  /* ══════════════════════════════════
     MAP SCREEN — Mobile only
  ══════════════════════════════════ */
  @media (max-width: 600px) {
    #map-screen { flex-direction: column; overflow-y: auto; }

    #map-grid-wrap {
      padding: 6px 8px 4px;
      gap: 4px;
    }
    #map-grid {
      grid-template-columns: repeat(8, 38px);
      grid-template-rows: repeat(8, 38px);
      gap: 2px;
    }
    .tile {
      width: 38px; height: 38px;
      font-size: 14px;
      border-radius: 3px;
    }
    .tile .tile-label { font-size: 6px; line-height: 1; }
    .tile .tile-name  { font-size: 5px; line-height: 1; }
    .tile .player-dot { font-size: 14px; }

    /* Floating dpad on mobile */
    #dpad {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: #060e08cc;
      border-radius: 8px;
      padding: 4px;
      backdrop-filter: blur(4px);
    }

    #dpad-float {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: #060e08cc;
      border-radius: 8px;
      padding: 4px;
      backdrop-filter: blur(4px);
      display: grid;
      grid-template: 36px 36px 36px / 36px 36px 36px;
      gap: 3px;
    }

    #map-side {
      border-left: none;
      border-top: 1px solid var(--border);
      padding: 8px 14px 100px; /* bottom padding so content clears the floating dpad */
    }
  }
  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .panel-label { font-size: 13px; color: var(--dim); letter-spacing: 2px; margin-bottom: 6px; }

  /* Party cards in sidebar */
  .party-card {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 7px;
  }
  .party-card .mon-emoji { font-size: 22px; }
  .party-card .mon-info { flex: 1; }
  .party-card .mon-name { font-size: 17px; }
  .mini-bar-wrap { height: 5px; background: #111; border-radius: 3px; overflow: hidden; margin-top: 2px; }
  .mini-bar { height: 100%; border-radius: 3px; transition: width .3s; }

  /* ══════════════════════════════════
     BATTLE SCREEN
  ══════════════════════════════════ */
  #battle-screen {
    flex-direction: column;
    background: radial-gradient(ellipse at 50% 0%, #0a1a2a 0%, #050810 70%);
  }

  #battle-top {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #enemy-side {
    width: 42%;
    border-right: 1px solid #0e2030;
    padding: 12px;
    overflow-y: auto;
  }
  #player-side {
    width: 58%;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 8px;
    overflow-y: auto;
  }
  #player-cards {
    flex-shrink: 0;
  }
  #action-panel {
    flex-shrink: 0;
    background: #060c14;
    border: 1px solid #0e2a3a;
    border-radius: 8px;
    padding: 10px;
    position: sticky;
    bottom: 0;
  }
  #action-label { font-size: 14px; color: var(--dim); margin-bottom: 8px; letter-spacing: 1px; }
  #moves-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .move-btn {
    background: #0a1820;
    border: 1px solid #1a3a5a;
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 17px;
    padding: 8px;
    border-radius: 5px;
    cursor: pointer;
    text-align: left;
    transition: border-color .15s, background .15s;
  }
  .move-btn:hover { background: #0e2030; border-color: var(--accent3); }
  .move-btn .move-sub { font-size: 13px; color: #3a6a7a; margin-top: 1px; }
  .move-btn:disabled { opacity: .4; cursor: not-allowed; }

  #battle-result {
    text-align: center;
    padding: 12px;
  }
  #result-title { font-family: 'Press Start 2P', monospace; font-size: 16px; margin-bottom: 8px; }
  .result-btn {
    background: #0a2a1a;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 6px 24px;
    border-radius: 5px;
    cursor: pointer;
  }
  .flee-btn {
    background: transparent;
    border: 1px solid #2a3a2a;
    color: var(--dim);
    font-family: 'VT323', monospace;
    font-size: 17px;
    padding: 3px 12px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: auto;
  }
  .flee-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Battle log */
  #battle-log {
    height: 88px;
    background: #040810;
    border-top: 1px solid #0e1a28;
    padding: 6px 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .log-line { font-size: 16px; color: #4a7a6a; margin-bottom: 1px; }
  .log-line.latest { color: #a8d8b8; }

  /* ══════════════════════════════════
     PARTY SCREEN
  ══════════════════════════════════ */
  #party-screen { flex-direction: row; }

  #party-list {
    width: 200px;
    border-right: 2px solid var(--border);
    padding: 10px;
    overflow-y: auto;
  }
  .plist-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .plist-card:hover, .plist-card.selected { border-color: var(--accent); }
  .plist-card .bench-tag { font-size: 12px; color: var(--dim); }

  #party-detail {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
  .stat-box {
    background: #0a1510;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .stat-box .sl { font-size: 13px; color: var(--dim); }
  .stat-box .sv { font-size: 24px; }
  .moves-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; }
  .move-card {
    background: #0a1510;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px;
    font-size: 16px;
  }
  .move-card .mc-sub { font-size: 13px; color: var(--dim); }
  .action-row { display: flex; gap: 8px; margin-top: 12px; }
  .small-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 17px;
    padding: 5px 14px;
    border-radius: 5px;
    cursor: pointer;
  }
  .small-btn:hover { border-color: var(--accent); color: var(--accent); }
  .small-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Inventory tab */
  #inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 4px 0; }
  .inv-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 16px;
  }
  .inv-card .ic-emoji { font-size: 28px; margin-bottom: 4px; }
  .inv-card .ic-name { font-size: 17px; }
  .inv-card .ic-eff { font-size: 13px; color: var(--dim); margin-top: 2px; }
  .inv-card .ic-rare { font-size: 12px; margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
  .rare-rare { color: var(--gold); border-color: var(--gold) !important; }
  .rare-uncommon { color: var(--shadow-el); border-color: var(--shadow-el) !important; }

  /* ══════════════════════════════════
     TOWN / SHOP SCREEN
  ══════════════════════════════════ */
  #town-screen { flex-direction: column; }
  #ranch-screen { flex-direction: column; }
  #town-header, #ranch-header {
    background: #060a0e;
    border-bottom: 2px solid var(--border);
    padding: 8px 16px 6px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
  }
  #town-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent2); }
  #ranch-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent2); }
  #town-tab-bar, #ranch-tab-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    width: 100%;
  }
  #town-body, #ranch-body { flex: 1; padding: 16px; overflow-y: auto; }
  .town-section { max-width: 640px; }
  .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-top: 10px; }
  .shop-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .shop-card .sc-emoji { font-size: 30px; margin-bottom: 6px; }
  .shop-card .sc-name { font-size: 18px; }
  .shop-card .sc-desc { font-size: 13px; color: var(--dim); margin: 4px 0 8px; }
  .buy-btn {
    background: #0a1a08;
    border: 1px solid #2a5a20;
    color: var(--accent);
    font-family: 'VT323', monospace;
    font-size: 17px;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
  }
  .buy-btn:hover { background: #152a10; }
  .buy-btn:disabled { opacity: .4; cursor: not-allowed; }
  .heal-big-btn {
    background: #0a2a14;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'VT323', monospace;
    font-size: 22px;
    padding: 8px 24px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
  }
  .heal-big-btn:hover { background: #142a1a; }
  .heal-big-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ══════════════════════════════════
     ENCOUNTER OVERLAY
  ══════════════════════════════════ */
  #encounter-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000000bb;
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #encounter-overlay.show { display: flex; }
  #encounter-box {
    background: var(--panel);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 28px 30px;
    min-width: 260px;
    text-align: center;
    box-shadow: 0 0 40px var(--accent) + '44';
  }
  #enc-emoji { font-size: 60px; margin-bottom: 8px; }
  #enc-name { font-size: 24px; color: var(--accent); }
  #enc-sub { font-size: 16px; color: var(--dim); margin: 4px 0 14px; }
  #enc-desc { font-size: 15px; color: var(--text); margin-bottom: 16px; }
  .enc-btns { display: flex; gap: 12px; justify-content: center; }
  .enc-accept {
    background: #0a2a10;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 7px 20px;
    border-radius: 6px;
    cursor: pointer;
  }
  .enc-decline {
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #5a5a5a;
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 7px 20px;
    border-radius: 6px;
    cursor: pointer;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--panel);
    border: 1px solid var(--accent);
    color: var(--text);
    font-size: 17px;
    padding: 8px 16px;
    border-radius: 12px;
    z-index: 400;
    transition: transform .3s ease, opacity .2s ease;
    pointer-events: none;
    max-width: 86vw;
    text-align: center;
    line-height: 1.4;
  }
  #toast.show {
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  #toast[style*="display: none"] { transition: none; }

  #stable-notifs {
    position: fixed;
    bottom: 80px;
    right: 16px;
    z-index: 500;
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    pointer-events: none;
  }
  .stable-notif {
    background: #0a1a10;
    border: 1px solid #2aff7a44;
    color: #a8e8b8;
    font-family: 'VT323', monospace;
    font-size: 16px;
    padding: 7px 14px;
    border-radius: 8px;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity .3s, transform .3s;
    max-width: 260px;
  }
  .stable-notif.show { opacity: 1; transform: translateX(0); }
  .stable-notif.fade { opacity: 0; transform: translateX(20px); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ══════════════════════════════════
     MOBILE — narrow screens (< 600px)
     Reflows all side-by-side layouts
     to vertical stacks so nothing is
     clipped by the Claude chat chrome.
  ══════════════════════════════════ */
  @media (max-width: 600px) {

    /* Shrink title bar */
    #titlebar { height: auto; padding: 5px 8px; flex-wrap: wrap; gap: 5px; }
    #titlebar .logo { font-size: 7px; width: 100%; }
    .nav-btn { font-size: 14px; padding: 3px 8px; }
    #titlebar .gold-disp { font-size: 16px; margin-left: auto; }

    /* ── MAP: stack grid above sidebar ── */
    #map-screen { flex-direction: column; overflow-y: auto; }

    #map-grid-wrap { padding: 8px; gap: 6px; }
    #map-grid {
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      width: min(96vw, 340px);
      height: min(96vw, 340px);
      gap: 2px;
    }
    .tile {
      width: 100%; height: 100%;
      font-size: 16px;
    }
    .tile .tile-label { display: none; }

    #dpad { grid-template: 42px 42px 42px / 42px 42px 42px; gap: 4px; }
    .dpad-btn { font-size: 22px; border-radius: 6px; }

    #map-side {
      border-left: none;
      border-top: 2px solid var(--border);
      padding: 10px;
      gap: 8px;
      flex-shrink: 0;
      overflow-y: visible;
    }

    /* ── BATTLE: stack enemies above player ── */
    #battle-top { flex-direction: column; overflow-y: auto; }

    #enemy-side {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid #0e2030;
      padding: 8px;
      overflow-y: visible;
    }
    #player-side {
      width: 100%;
      padding: 8px;
      overflow-y: visible;
    }

    #moves-grid { grid-template-columns: 1fr 1fr; gap: 5px; }
    .move-btn { font-size: 15px; padding: 7px 5px; }

    #battle-log { height: 72px; font-size: 14px; }

    /* ── PARTY: stack list above detail ── */
    #party-screen { flex-direction: column; }
    #party-list {
      width: 100%;
      border-right: none;
      border-bottom: 2px solid var(--border);
      padding: 8px;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 5px;
      overflow-x: auto;
      overflow-y: visible;
      flex-shrink: 0;
    }
    .plist-card { min-width: 100px; margin-bottom: 0; }
    #party-detail { padding: 10px; overflow-y: auto; }
    .stat-grid { grid-template-columns: 1fr 1fr 1fr; }

    /* ── TOWN: reduce padding ── */
    #town-body, #ranch-body { padding: 10px; }
    .shop-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .shop-card { padding: 8px; }
    .shop-card .sc-emoji { font-size: 22px; }

    /* ── ENCOUNTER: fit on small screens ── */
    #encounter-box { padding: 18px 16px; min-width: 220px; max-width: 90vw; }
    #enc-emoji { font-size: 44px; }
    #enc-name { font-size: 20px; }

    /* ── TOAST ── */
    #toast { font-size: 15px; padding: 6px 16px; bottom: 10px; }
  }

  /* ── SAFE AREA: pad bottom of all scrollable containers
        so content isn't hidden behind the Claude chat bar ── */
  @media (max-width: 600px) {
    /* Extra bottom breathing room on every scrollable surface */
    #map-side,
    #town-body,
    #ranch-body,
    #party-detail,
    #battle-log,
    #party-list,
    #inv-grid,
    #battle-top,
    #map-screen {
      padding-bottom: max(120px, env(safe-area-inset-bottom, 120px));
    }
    /* The encounter box should sit above the chat bar too */
    #encounter-overlay { align-items: flex-start; padding-top: 60px; padding-bottom: 140px; }
    /* Toast clears the chat bar */
    #toast { bottom: 130px; }
  }

  /* Mid-range: tablets / narrow desktop */
  @media (min-width: 601px) and (max-width: 860px) {
    #map-grid {
      grid-template-columns: repeat(6, 48px);
      grid-template-rows: repeat(6, 48px);
    }
    .tile { width: 48px; height: 48px; font-size: 18px; }
    #enemy-side { width: 45%; }
    #player-side { width: 55%; }
  }
</style>
</head>
<body>

<!-- TITLE BAR -->
<div id="titlebar">
  <div class="logo">🐉 REALM OF ECHOES</div>
  <button class="nav-btn active" onclick="showScreen('map')">🗺 MAP</button>
  <button class="nav-btn" onclick="showScreen('party')">📋 PARTY</button>
  <button class="nav-btn" onclick="showInventory()">📦 ITEMS</button>
  <div class="gold-disp" id="gold-disp">💰 100g</div>
</div>

<!-- MAP SCREEN -->
<div class="screen active" id="map-screen">
  <div id="map-grid-wrap">
    <div id="map-grid"></div>
    <div id="dpad">
      <div></div>

const TIER_PCT = { S: 0.18, A: 0.13, B: 0.08, C: 0.04 };

function calcLevelUpGains(typeId, baseStats) {
  const tiers = GROWTH_TIERS[typeId] || { hp:'B', atk:'B', def:'B', spd:'B', int:'B' };
  return {
    hp:  Math.max(1, Math.round(baseStats.hp  * TIER_PCT[tiers.hp])),
    atk: Math.max(1, Math.round(baseStats.atk * TIER_PCT[tiers.atk])),
    def: Math.max(1, Math.round(baseStats.def * TIER_PCT[tiers.def])),
    spd: Math.max(1, Math.round(baseStats.spd * TIER_PCT[tiers.spd])),
    int: Math.max(1, Math.round(baseStats.int * TIER_PCT[tiers.int])),
  };
}

// Generate names for all uniquely-named tiles at startup
// namedTiles: { "r,c": "Name" }
const NAMED_TILE_TYPES = new Set(["town","shop","ruins","ranch"]);
const TILE_NAMES = {};
for (let r=0; r<MAP_TILES.length; r++) {
  for (let c=0; c<MAP_TILES[r].length; c++) {
    if (NAMED_TILE_TYPES.has(MAP_TILES[r][c])) {
      TILE_NAMES[`${r},${c}`] = generateTileName();
    }
  }
}


// Generate trapper special stock for each town tile at startup
// 2 random non-safe adjacent tile monsters, level 3, one-time purchase per town
function generateTrapperInventory() {
  const inv = {};
  const TOWN_TYPES = new Set(["town", "shop"]);
  for (let r = 0; r < MAP_TILES.length; r++) {
    for (let c = 0; c < MAP_TILES[r].length; c++) {
      if (!TOWN_TYPES.has(MAP_TILES[r][c])) continue;
      // Collect monsters from tiles within 2 steps (Manhattan distance)
      const adjMonsters = [];
      for (let dr = -2; dr <= 2; dr++) {
        for (let dc = -2; dc <= 2; dc++) {
          if (Math.abs(dr) + Math.abs(dc) > 2 || (dr === 0 && dc === 0)) continue;
          const ar = r + dr, ac = c + dc;
          if (ar < 0 || ar >= MAP_TILES.length || ac < 0 || ac >= MAP_TILES[0].length) continue;
          const td = TILE_DATA[MAP_TILES[ar][ac]];
          if (td && !td.safe && td.monsters) {
            td.monsters.forEach(mId => {
              const t = MONSTER_TYPES.find(x => x.id === mId);
              if (t && !adjMonsters.find(x => x.id === mId)) adjMonsters.push(t);
            });
          }
        }
      }
      // Shuffle and pick 2, excluding base shop monsters
      const shopIds = new Set(MONSTER_TYPES.slice(0, SHOP_MONSTER_COUNT).map(m => m.id));
      const eligible = adjMonsters.filter(m => !shopIds.has(m.id));
      for (let i = eligible.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [eligible[i], eligible[j]] = [eligible[j], eligible[i]];
      }
      inv[`${r},${c}`] = eligible.slice(0, 2).map(t => ({ typeId: t.id, purchased: false }));
    }
  }
  return inv;
}

function makeMonster(typeId, level=1) {
  const t = MONSTER_TYPES.find(x => x.id===typeId) || MONSTER_TYPES[0];
  const v = () => Math.floor(Math.random()*8)-4;
  const sc = b => Math.floor(b + (level-1)*b*0.12 + v());
  const mhp = sc(t.base.hp);
  return {
    uid:uid(), typeId:t.id, name:t.name, element:t.element, emoji:t.emoji,
    level, xp:0, xpNeeded:level*100,
    hp:mhp, maxHp:mhp, mp:50, maxMp:50,
    atk:sc(t.base.atk), def:sc(t.base.def), spd:sc(t.base.spd), int:sc(t.base.int),
    buffs:{}, moves:[PHYSICAL_BY_MONSTER[t.id], ...MOVES_BY_EL[t.element]],
    equippedTech: null, techSlots: null, hitBonus: 0,
  };
}

function renderMap() {
  const grid = document.getElementById('map-grid');
  grid.innerHTML = '';
  for (let r=0;r<MAP_TILES.length;r++) {
    for (let c=0;c<MAP_TILES[r].length;c++) {
      const tileId = MAP_TILES[r][c];
      const td = TILE_DATA[tileId];
      const isPlayer = r===STATE.pos.r && c===STATE.pos.c;
      const adj = Math.abs(r-STATE.pos.r)+Math.abs(c-STATE.pos.c)===1;
      const el = document.createElement('div');
      el.className = 'tile' + (isPlayer?' player':'');
      el.style.background = td.color;
      // Ruins: tint based on state
      if (tileId === 'ruins') {
        const rs = STATE.ruins?.[`${r},${c}`];
        if (rs?.rebuildStep >= 3) el.style.background = '#180e28';
        else if (rs?.bossDefeated) el.style.background = '#0e1828';
      }
      const tileName = TILE_NAMES[`${r},${c}`];
      el.innerHTML = isPlayer
        ? `<span class="player-dot">🧑</span>`
        : tileName
          ? `<span>${td.emoji}</span><span class="tile-label">${td.label.slice(0,7)}</span><span class="tile-name">of ${tileName}</span>`
          : `<span>${td.emoji}</span><span class="tile-label">${td.label.slice(0,7)}</span>`;
      if (adj) el.onclick = () => tryMove(r-STATE.pos.r, c-STATE.pos.c);
      grid.appendChild(el);
    }
  }
}

function renderMapSide() {
  const td = TILE_DATA[MAP_TILES[STATE.pos.r][STATE.pos.c]];
  const tileId = MAP_TILES[STATE.pos.r][STATE.pos.c];
  const tileName = TILE_NAMES[`${STATE.pos.r},${STATE.pos.c}`];
  document.getElementById('loc-name').textContent = td.emoji + ' ' + (tileName ? `${td.label} of ${tileName}` : td.label);
  const infos = [];
  if (td.monsters) infos.push('⚔ Monsters roam here');
  if (td.plants) infos.push('🌿 Plants grow');
  if (td.minerals) infos.push('⛏ Minerals found');
  if (td.safe && tileId === 'ruins') {
    const rs = STATE.ruins?.[`${STATE.pos.r},${STATE.pos.c}`];
    const rd = RUINS_DATA[`${STATE.pos.r},${STATE.pos.c}`];
    if (!rs?.bossDefeated) infos.push(`⚔ ${rd?.bossName || 'Boss'} lurks within`);
    else if (rs.rebuildStep < 3) infos.push(`🔨 Rebuilding (${rs.rebuildStep}/3)`);
    else infos.push(`🏛 Rebuilt · ${rs.facilities.length}/3 facilities`);
  } else if (td.safe) {
    infos.push('🕊 Safe area');
  }
  document.getElementById('loc-info').textContent = infos.join(' · ');

  // Party
  const sp = document.getElementById('side-party');
  sp.innerHTML = '';
  STATE.party.forEach(m => {
    const el = ELEMENTS[m.element];
    const hpPct = Math.max(0,(m.hp/m.maxHp)*100);
    const mpPct = Math.max(0,(m.mp/m.maxMp)*100);
    const col = hpPct<30?'#ff3a3a':hpPct<60?'#ffd84a':'#2aff7a';
    sp.innerHTML += `<div class="party-card">
      <span class="mon-emoji">${m.emoji}</span>
      <div class="mon-info">
        <div class="mon-name" style="color:${el.color}">${m.name} <span style="color:var(--dim);font-size:14px">Lv.${m.level}</span></div>
        <div class="mini-bar-wrap"><div class="mini-bar" style="width:${hpPct}%;background:${col}"></div></div>
        <div class="mini-bar-wrap" style="margin-top:2px"><div class="mini-bar" style="width:${mpPct}%;background:#60a5fa"></div></div>
      </div>
    </div>`;
  });
  updateGold();
}

function updateTownBtn() {
  const {r, c} = STATE.pos;
  const tileId = MAP_TILES[r][c];
  const td = TILE_DATA[tileId];
  const btn = document.getElementById('town-nav-btn');
  const ranchBtn = document.getElementById('build-ranch-btn');

  // Town/Ranch enter button
  if (td.safe) {
    btn.style.display = '';
    if (tileId === 'ranch' || (STATE.ranch && STATE.ranch.r === r && STATE.ranch.c === c)) {
      const rName = STATE.ranch ? STATE.ranch.name : 'RANCH';
      btn.textContent = `🏡 ${rName}`;
    } else if (tileId === 'ruins') {
      const ruinsName = TILE_NAMES[`${r},${c}`] || 'RUINS';
      const rs = STATE.ruins?.[`${r},${c}`];
      const rd = RUINS_DATA[`${r},${c}`];
      const label = rs?.bossDefeated ? (rs.rebuildStep >= 3 ? '🏛' : '🔨') : '⛩';
      btn.textContent = `${label} ${ruinsName}`;
    } else {
      btn.textContent = '🏙 TOWN';
    }
    STATE.currentTownMode = td.enter || 'town';
  } else {
    btn.style.display = 'none';
  }

  // Build Ranch button — show only if: tile is not safe, no ranch built yet, and tile is ≥3 from all safe spots
  if (!td.safe && !STATE.ranch) {
    const canBuild = isValidRanchLocation(r, c);
    ranchBtn.style.display = '';
    ranchBtn.disabled = !canBuild || STATE.gold < 1000;
    ranchBtn.style.opacity = (!canBuild || STATE.gold < 1000) ? '0.4' : '1';
    ranchBtn.style.cursor = (!canBuild || STATE.gold < 1000) ? 'not-allowed' : 'pointer';
    ranchBtn.textContent = STATE.gold < 1000 ? `🏡 BUILD RANCH (need 1000g)` : canBuild ? `🏡 BUILD RANCH · 1000g` : `🏡 TOO CLOSE TO SAFE ZONE`;
  } else {
    ranchBtn.style.display = 'none';
  }

  // Search button — disabled on safe tiles
  const sb = document.getElementById('search-btn');
  if (sb) {
    if (td.safe) {
      sb.disabled = true;
      sb.style.opacity = '0.3';
      sb.style.cursor = 'not-allowed';
    } else {
      sb.disabled = false;
      sb.style.opacity = '1';
      sb.style.cursor = 'pointer';
    }
  }
}

function isValidRanchLocation(r, c) {
  // Must be ≥3 Manhattan distance from any safe tile
  for (let tr = 0; tr < MAP_TILES.length; tr++) {
    for (let tc = 0; tc < MAP_TILES[tr].length; tc++) {
      const tileId = MAP_TILES[tr][tc];
      if (TILE_DATA[tileId] && TILE_DATA[tileId].safe) {
        const dist = Math.abs(tr - r) + Math.abs(tc - c);
        if (dist < 3) return false;
      }
    }
  }
  return true;
}

function tryBuildRanch() {
  const {r, c} = STATE.pos;
  const tileId = MAP_TILES[r][c];
  const td = TILE_DATA[tileId];
  if (td.safe || STATE.ranch) return;
  if (!isValidRanchLocation(r, c)) { toast('🏡 Too close to a safe area!'); return; }
  if (STATE.gold < 1000) { toast('🏡 Need 1000g to build a Ranch!'); return; }

  const name = generateTileName();
  STATE.gold -= 1000;
  STATE.ranch = { r, c, tileId, name };
  // Convert tile on map to ranch
  MAP_TILES[r][c] = 'ranch';
  TILE_NAMES[`${r},${c}`] = name;
  updateGold();
  renderMap();
  renderMapSide();
  updateTownBtn();
  toast(`🏡 Ranch "${name}" built!`);
}

function enterLocation() {
  const tileId = MAP_TILES[STATE.pos.r][STATE.pos.c];
  if (tileId === 'ranch') {
    enterRanch();
  } else if (tileId === 'ruins') {
    enterRuins();
  } else {
    showScreen('town');
    renderTown();
  }
}

function searchArea() {
  const td = TILE_DATA[MAP_TILES[STATE.pos.r][STATE.pos.c]];
  if (td.safe) return;
  advanceTime();
  renderMapSide();
  if (Math.random() < 0.90) {
    triggerTileEvent();
  } else {
    toast('🔍 You search the area but find nothing.');
  }
}

// RANCH
// ════════════════════════════════════════════════════════
let activeRanchTab = 0;

function enterRanch() {
  showScreen('ranch');
  renderRanch();
}

function renderRanch() {
  const name = STATE.ranch ? STATE.ranch.name : 'Ranch';
  document.getElementById('ranch-title').textContent = `🏡 ${name}`;
  renderRanchInnTab();
  switchRanchTab(activeRanchTab);
}

function switchRanchTab(n) {
  activeRanchTab = n;
  document.getElementById('ranch-tab-heal').style.display   = n===0 ? 'block' : 'none';
  document.getElementById('ranch-tab-tech').style.display   = n===1 ? 'block' : 'none';
  document.getElementById('ranch-tab-stable').style.display = n===2 ? 'block' : 'none';
  if (n===1) renderRanchTechTab();
  if (n===2) renderRanchStableTab();
}

function renderInnTab(tabElemId, restFn) {
  const INN_RATE = 2; // gold per monster per hour
  const party = [...STATE.party, ...STATE.bench];
  const durations = [6, 12, 24];

  const monCards = party.map(m => {
    const el = ELEMENTS[m.element];
    const hpPct = Math.max(0, (m.hp / m.maxHp) * 100);
    const mpPct = Math.max(0, (m.mp / m.maxMp) * 100);
    const hpCol = hpPct < 30 ? '#ff3a3a' : hpPct < 60 ? '#ffd84a' : '#2aff7a';
    const hpRegen = Math.max(1, Math.floor(m.def / 8));
    const mpRegen = Math.max(1, Math.floor(m.int / 10));
    const inParty = !!STATE.party.find(x => x.uid === m.uid);
    return `<div class="shop-card" style="border-color:${el.color}44">
      <div class="sc-emoji">${m.emoji}</div>
      <div class="sc-name" style="color:${el.color}">${m.name}</div>
      <div style="font-size:13px;color:var(--dim);margin-bottom:6px">Lv.${m.level} · ${inParty ? 'Party' : 'Bench'}</div>
      <div style="font-size:12px;color:${hpCol};margin-bottom:2px">HP ${m.hp} / ${m.maxHp}</div>
      <div class="bar-wrap" style="margin-bottom:4px"><div class="bar-fill" style="width:${hpPct}%;background:${hpCol}"></div></div>
      <div style="font-size:12px;color:#60a5fa;margin-bottom:2px">MP ${m.mp} / ${m.maxMp}</div>
      <div class="bar-wrap" style="margin-bottom:6px"><div class="bar-fill" style="width:${mpPct}%;background:#60a5fa"></div></div>
      <div style="font-size:12px;color:var(--dim)">+${hpRegen} HP/hr · +${mpRegen} MP/hr</div>
    </div>`;
  }).join('');

  const restBtns = durations.map(hrs => {
    const totalCost = party.length * INN_RATE * hrs;
    const canAfford = STATE.gold >= totalCost;
    return `<button class="buy-btn" ${canAfford ? '' : 'disabled'}
      onclick="${restFn}(${hrs})"
      style="flex:1;border-color:${canAfford ? 'var(--accent)' : '#333'};color:${canAfford ? 'var(--accent)' : '#555'}">
      ${hrs}h · ${totalCost}g
    </button>`;
  }).join('');

  document.getElementById(tabElemId).innerHTML = `
    <div style="font-size:18px;color:var(--dim);margin-bottom:4px">Rest to recover HP and MP.</div>
    <div style="font-size:14px;color:var(--dim);margin-bottom:10px">🪙 ${INN_RATE}g · monster · hour · HP: DEF/8 · MP: INT/10</div>
    <div style="display:flex;gap:8px;margin-bottom:16px">${restBtns}</div>
    <div class="shop-grid">${monCards}</div>`;
}

function doInnRest(hours, afterFn) {
  const INN_RATE = 2;
  const party = [...STATE.party, ...STATE.bench];
  const totalCost = party.length * INN_RATE * hours;
  if (STATE.gold < totalCost) return;
  STATE.gold -= totalCost;
  const applyRest = (list) => list.map(m => ({
    ...m,
    hp: Math.min(m.maxHp, m.hp + Math.max(1, Math.floor(m.def / 8)) * hours),
    mp: Math.min(m.maxMp, m.mp + Math.max(1, Math.floor(m.int / 10)) * hours),
  }));
  STATE.party = applyRest(STATE.party);
  STATE.bench  = applyRest(STATE.bench);
  for (let i = 0; i < hours; i++) advanceTime();
  updateGold();
  afterFn();
  toast(`Rested ${hours}h · -${totalCost}g`);
}

function renderRanchInnTab() {
  renderInnTab('ranch-tab-heal', 'ranchInnRest');
}

function ranchInnRest(hours) {
  doInnRest(hours, renderRanch);
}

function renderRanchTechTab() {
  renderWorkshopInto('ranch-tab-tech');
}

function renderRanchStableTab() {
  renderStableTab('ranch-tab-stable');
}

function renderRuinsStableTab() {
  renderStableTab('ruins-tab-stable');
}

function dpadMove(dr, dc) {
  tryMove(dr, dc);
  // Blur focused button so it doesn't capture subsequent key events
  if (document.activeElement instanceof HTMLElement) document.activeElement.blur();
  // Scroll map screen back to top so player sees the grid
  const mapScreen = document.getElementById('map-screen');
  if (mapScreen) mapScreen.scrollTop = 0;
}

function updateDpadVisibility() {
  const dpad = document.getElementById('dpad-float');
  if (!dpad) return;
  const isMobile = window.innerWidth <= 600;
  const mapActive = document.getElementById('map-screen')?.classList.contains('active');
  dpad.style.display = (isMobile && mapActive) ? 'grid' : 'none';
}

function tryMove(dr, dc) {
  const nr = STATE.pos.r+dr, nc = STATE.pos.c+dc;
  if (nr<0||nr>=MAP_TILES.length||nc<0||nc>=MAP_TILES[0].length) return;
  STATE.pos = {r:nr, c:nc};
  advanceTime();
  renderMap();
  renderMapSide();
  updateTownBtn();
  triggerTileEvent();
}

document.addEventListener('keydown', e => {
  const map = {'ArrowUp':[-1,0],'ArrowDown':[1,0],'ArrowLeft':[0,-1],'ArrowRight':[0,1]};
  if (map[e.key] && document.getElementById('map-screen').classList.contains('active')
      && e.target.tagName !== 'BUTTON') {
    e.preventDefault();
    tryMove(...map[e.key]);
  }
});

function triggerTileEvent() {
  const td = TILE_DATA[MAP_TILES[STATE.pos.r][STATE.pos.c]];
  if (td.safe) return;
  const roll = Math.random();
  if (roll < 0.42 && td.monsters) {
    const typeId = td.monsters[Math.floor(Math.random()*td.monsters.length)];
    const t = MONSTER_TYPES.find(x=>x.id===typeId);
    const avgLvl = Math.max(1, Math.round(STATE.party.reduce((s,m)=>s+m.level,0)/STATE.party.length));
    const lvl = Math.max(1, avgLvl+Math.floor(Math.random()*3)-1);
    const mon = makeMonster(typeId, lvl);
    STATE.encounter = { type:'monster', data:mon };
    showEncounter();
  } else if (roll < 0.58 && td.plants) {
    const plant = PLANT_TYPES[Math.floor(Math.random()*PLANT_TYPES.length)];
    const qty = 1 + Math.floor(Math.random() * 5);
    STATE.encounter = { type:'plant', data:plant, qty };
    showEncounter();
  } else if (roll < 0.72 && td.minerals) {
    const mineral = MINERAL_TYPES[Math.floor(Math.random()*MINERAL_TYPES.length)];
    const qty = 1 + Math.floor(Math.random() * 5);
    STATE.encounter = { type:'mineral', data:mineral, qty };
    showEncounter();
  }
}

// ════════════════════════════════════════════════════════
// ENCOUNTER
// ════════════════════════════════════════════════════════
function showEncounter() {
  const enc = STATE.encounter;
  const el = document.getElementById('encounter-overlay');
  document.getElementById('enc-emoji').textContent = enc.data.emoji;
  document.getElementById('enc-name').textContent = enc.data.name;
  if (enc.type==='monster') {
    const elem = ELEMENTS[enc.data.element];
    document.getElementById('enc-sub').textContent = elem.icon+' '+enc.data.element+' · Lv.'+enc.data.level;
    document.getElementById('enc-desc').textContent = 'A wild monster appeared!';
    document.getElementById('enc-accept-btn').textContent = '⚔ Battle!';
    document.getElementById('encounter-box').style.borderColor = elem.color;
    document.getElementById('enc-decline-btn').textContent = '🏃 Flee';
  } else {
    const rareColor = enc.data.rarity==='rare'?'#ffd84a':enc.data.rarity==='uncommon'?'#c084fc':'#4a6a50';
    document.getElementById('enc-sub').style.color = rareColor;
    document.getElementById('enc-sub').textContent = enc.data.rarity+' · '+enc.data.effect;
    const qty = enc.qty || 1;
    document.getElementById('enc-desc').textContent = enc.type==='plant'
      ? `You found ${qty > 1 ? qty+'× ' : 'a '}plant${qty > 1 ? 's' : ''}!`
      : `You discovered ${qty > 1 ? qty+'× ' : 'a '}mineral${qty > 1 ? 's' : ''}!`;
    document.getElementById('enc-accept-btn').textContent = `✅ Collect${qty > 1 ? ' (×'+qty+')' : ''}`;
    document.getElementById('encounter-box').style.borderColor = enc.type==='plant'?'#2aff7a':'#ffd84a';
    document.getElementById('enc-decline-btn').textContent = 'Skip';
  }
  el.classList.add('show');
}

function acceptEncounter() {
  const enc = STATE.encounter;
  document.getElementById('encounter-overlay').classList.remove('show');
  STATE.encounter = null;
  if (enc.type==='monster') {
    // Build enemy team (1–2 monsters)
    const avgLvl = Math.max(1, Math.round(STATE.party.reduce((s,m)=>s+m.level,0)/STATE.party.length));
    const count = Math.random()<0.4 ? 2 : 1;
    STATE.battleEnemies = [enc.data];
    for (let i=1;i<count;i++) {
      const t = MONSTER_TYPES[Math.floor(Math.random()*MONSTER_TYPES.length)];
      STATE.battleEnemies.push(makeMonster(t.id, Math.max(1,avgLvl+Math.floor(Math.random()*2)-1)));
    }
    startBattle();
  } else {
    const qty = enc.qty || 1;
    for (let i = 0; i < qty; i++) STATE.inventory.push({ ...enc.data });
    toast(`Found ${qty > 1 ? qty+'× ' : ''}${enc.data.emoji} ${enc.data.name}!`);
  }
}

function declineEncounter() {
  const enc = STATE.encounter;
  STATE.encounter = null;
  document.getElementById('encounter-overlay').classList.remove('show');

  if (enc && enc.type === 'monster') {
    // Apply same flee logic as in-battle: each enemy 50% chance to hit a random party member
    const enemies = [enc.data];
    const fleeLog = [];
    let hits = 0;
    enemies.forEach(enemy => {
      if (Math.random() < 0.5) {
        const alive = STATE.party.filter(m => m.hp > 0);
        if (alive.length === 0) return;
        const target = alive[Math.floor(Math.random() * alive.length)];
        const dmg = Math.max(1, Math.floor(enemy.atk * 0.6));
        const tIdx = STATE.party.findIndex(m => m.uid === target.uid);
        if (tIdx >= 0) {
          STATE.party[tIdx] = { ...STATE.party[tIdx], hp: Math.max(0, STATE.party[tIdx].hp - dmg) };
          fleeLog.push(`${enemy.emoji} ${enemy.name} hit ${target.emoji} ${target.name} for ${dmg}!`);
          hits++;
        }
      }
    });
    STATE.lastBattleLog = [`🏃 Fled from ${enc.data.emoji} ${enc.data.name}!`, ...fleeLog];
    STATE.lastBattleResult = 'defeat';
    updateLastBattleBtn();
    renderMapSide();
    toast(hits > 0 ? `Fled! Took a hit while escaping!` : `Fled safely!`);
  }
}

// ════════════════════════════════════════════════════════
let battleState = null;

function startBattle() {
  battleState = {
    pTeam: STATE.party.filter(m=>m.hp>0).map(m => {
      const copy = {...m, buffs:{...m.buffs}};
      return copy;
    }),
    eTeam: STATE.battleEnemies.map(m=>({...m, buffs:{}})),
    phase: 'pick',
    activeIdx: 0,
    pendingMoves: [],
    log: ['⚔ Battle begins!'],
  };
  battleState.activeIdx = battleState.pTeam.findIndex(m=>m.hp>0);
  showScreen('battle');
  renderBattle();
}

function renderBattle() {
  const bs = battleState;
  renderEnemyCards();
  renderPlayerCards();
  renderActionPanel();
  renderBattleLog();
}

function renderEnemyCards() {
  const bs = battleState;
  const el_wrap = document.getElementById('enemy-cards');
  el_wrap.innerHTML = '';
  bs.eTeam.forEach((m,i) => {
    const el = ELEMENTS[m.element];
    const hpPct = Math.max(0,(m.hp/m.maxHp)*100);
    const targetable = bs.phase==='target' && m.hp>0;
    const buffTags = Object.entries(m.buffs||{}).filter(([,v])=>v>0)
      .map(([stat,val]) => `<span style="background:#1a2a0a;border:1px solid #4a7a20;color:#a3e635;font-size:11px;padding:1px 5px;border-radius:3px;margin-right:3px">▲${stat.toUpperCase()}+${val}</span>`).join('');
    el_wrap.innerHTML += `<div class="battle-card${targetable?' targetable':''}${m.hp<=0?' fainted':''}"
      style="background:linear-gradient(135deg,${el.bg},#080c10);border-color:${el.color}"
      ${targetable?`onclick="selectTarget(${i})"`:''}
      id="ecard-${i}">
      <div class="bc-header">
        <span class="bc-emoji">${m.emoji}</span>
        <div>
          <div class="bc-name" style="color:${el.color}">${m.name}</div>
          <div class="bc-sub">${el.icon} ${m.element} · Lv.${m.level}</div>
        </div>
        ${m.hp<=0?'<span style="margin-left:auto;color:#333;font-size:14px">FAINTED</span>':''}
      </div>
      ${buffTags ? `<div style="margin-bottom:4px">${buffTags}</div>` : ''}
      ${m.hp>0?`<div class="stat-row"><span>HP</span><span style="color:#ff6b6b">${m.hp}/${m.maxHp}</span></div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${hpPct}%;background:#ff4a6a"></div></div>`:''}
    </div>`;
  });
}

function renderPlayerCards() {
  const bs = battleState;
  const pw = document.getElementById('player-cards');
  pw.innerHTML = '';
  bs.pTeam.forEach((m,i) => {
    const el = ELEMENTS[m.element];
    const hpPct = Math.max(0,(m.hp/m.maxHp)*100);
    const mpPct = Math.max(0,(m.mp/m.maxMp)*100);
    const isActive = i===bs.activeIdx && bs.phase==='pick' && m.hp>0;
    const hpCol = hpPct<30?'#ff3a3a':hpPct<60?'#ffd84a':'#2aff7a';
    // Effective stats = base + buffs
    const effAtk = m.atk + (m.buffs?.atk||0);
    const effDef = m.def + (m.buffs?.def||0);
    const effSpd = m.spd + (m.buffs?.spd||0);
    const statColor = (base, eff) => eff > base ? '#a3e635' : '#c8e8d0';
    const buffTags = Object.entries(m.buffs||{}).filter(([,v])=>v>0)
      .map(([stat,val]) => `<span style="background:#0a2a0a;border:1px solid #4a7a20;color:#a3e635;font-size:11px;padding:1px 5px;border-radius:3px;margin-right:3px">▲${stat.toUpperCase()}+${val}</span>`).join('');
    pw.innerHTML += `<div class="battle-card${m.hp<=0?' fainted':''}${isActive?' active-mon':''}"
      style="background:linear-gradient(135deg,${el.bg},#080c10);border-color:${isActive?el.glow:el.color}">
      <div class="bc-header">
        <span class="bc-emoji">${m.emoji}</span>
        <div style="flex:1">
          <div class="bc-name" style="color:${el.color}">${m.name} <span style="color:var(--dim);font-size:14px">Lv.${m.level}</span></div>
          <div class="bc-sub">
            <span style="color:${statColor(m.atk,effAtk)}">ATK:${effAtk}</span>
            <span style="margin:0 3px">·</span>
            <span style="color:${statColor(m.def,effDef)}">DEF:${effDef}</span>
            <span style="margin:0 3px">·</span>
            <span style="color:${statColor(m.spd,effSpd)}">SPD:${effSpd}</span>
          </div>
        </div>
        ${m.hp<=0?'<span style="color:#333;font-size:14px">FAINTED</span>':''}
      </div>
      ${buffTags ? `<div style="margin-bottom:4px">${buffTags}</div>` : ''}
      ${m.hp>0?`<div class="stat-row"><span style="font-size:14px">HP</span><span style="color:#2aff7a;font-size:14px">${m.hp}/${m.maxHp}</span></div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${hpPct}%;background:${hpCol}"></div></div>
      <div class="stat-row"><span style="font-size:14px">MP</span><span style="color:#60a5fa;font-size:14px">${m.mp}/${m.maxMp}</span></div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${mpPct}%;background:#60a5fa"></div></div>`:''}
    </div>`;
  });
}

function renderActionPanel() {
  const bs = battleState;
  const ap = document.getElementById('action-panel');
  const al = document.getElementById('action-label');
  const mg = document.getElementById('moves-grid');
  const br = document.getElementById('battle-result');
  mg.style.display = 'grid';
  br.style.display = 'none';

  if (bs.phase==='result') {
    mg.style.display = 'none';
    br.style.display = 'block';
    const win = bs.eTeam.every(m=>m.hp<=0);
    const earned = win ? bs.eTeam.reduce((s,m)=>s+m.level*15,0) : 0;
    const drops = win ? (bs.resourceDrops || {}) : {};
    const dropHtml = Object.entries(drops).map(([el, qty]) =>
      `<span style="margin-right:8px">${ELEMENTAL_RESOURCES[el].emoji} ${qty}x ${ELEMENTAL_RESOURCES[el].name}</span>`
    ).join('');
    br.innerHTML = `<div id="result-title" style="color:${win?'#2aff7a':'#ff3a3a'}">${win?'🏆 VICTORY!':'💀 DEFEAT'}</div>
      ${win?`<div style="color:var(--gold);margin-bottom:6px">+${earned} gold</div>`:''}
      ${dropHtml ? `<div style="font-size:15px;margin-bottom:10px;color:#c8e8d0">${dropHtml}</div>` : ''}
      <button class="result-btn" onclick="endBattle(${win},${earned})" style="border-color:${win?'var(--accent)':'var(--danger)'}">Continue →</button>`;
    return;
  }

  if (bs.phase==='target') {
    al.innerHTML = '👆 Click an enemy to target!';
    mg.innerHTML = '';
    return;
  }

  const mon = bs.pTeam[bs.activeIdx];
  if (!mon || mon.hp<=0) { al.innerHTML = '...'; mg.innerHTML=''; return; }
  const el = ELEMENTS[mon.element];

  // Turn order bar: show all alive party members, highlight active, grey out done
  const aliveP = bs.pTeam.filter(m=>m.hp>0);
  const doneUids = new Set(bs.pendingMoves.filter(p=>p.who==='player').map(p=>bs.pTeam[p.mIdx]?.uid));
  const turnNum = doneUids.size + 1;
  const turnTotal = aliveP.length;
  const turnBar = aliveP.map(m => {
    const mel = ELEMENTS[m.element];
    const isDone = doneUids.has(m.uid);
    const isAct = m.uid === mon.uid;
    const bg = isDone ? '#111' : isAct ? mel.bg : '#0a0a0a';
    const border = isDone ? '#222' : isAct ? mel.glow : '#333';
    const opacity = isDone ? 0.4 : 1;
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;
      border:2px solid ${border};border-radius:6px;background:${bg};opacity:${opacity};
      min-width:44px;transition:all .2s">
      <span style="font-size:18px">${m.emoji}</span>
      <span style="font-size:11px;color:${isAct?mel.color:'#555'}">${isDone?'✓ done':isAct?'▶ now':'wait'}</span>
    </div>`;
  }).join('');

  al.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
      ${turnBar}
    </div>
    <div style="color:${el.color};font-size:18px">${mon.emoji} ${mon.name} — pick a move <span style="color:var(--dim);font-size:14px">(${turnNum}/${turnTotal})</span></div>`;

  mg.innerHTML = mon.moves.map((mv,i) => {
    const isPhysical = mv.type === 'physical';
    const canAfford = isPhysical || mon.mp >= mv.mp;
    const mpLabel = isPhysical
      ? `<span style="color:#aaa">⚔ Physical · Free · scales with Lv</span>`
      : `${mv.type==='attack'?'PWR:'+mv.power:'BUFF'} · <span style="color:${canAfford?'#60a5fa':'#ff3a3a'}">MP:${mv.mp}</span>${!canAfford?' ✗':''}`;
    return `
    <button class="move-btn" onclick="selectMove(${i})" ${canAfford ? '' : 'disabled'}
      style="border-color:${isPhysical ? '#888' : canAfford ? el.color+'44' : '#222'};opacity:${canAfford ? 1 : 0.4}">
      <span style="color:${isPhysical ? '#ddd' : canAfford ? el.glow : '#555'}">${mv.name}</span>
      <div class="move-sub">${mpLabel}</div>
    </button>`;
  }).join('');
}

function renderBattleLog() {
  const bl = document.getElementById('battle-log');
  bl.innerHTML = battleState.log.slice(-20).map((l,i,a) =>
    `<div class="log-line${i===a.length-1?' latest':''}">${l}</div>`).join('');
  bl.scrollTop = bl.scrollHeight;
  // Remove 'latest' highlight after 1.2s so it doesn't persist
  clearTimeout(renderBattleLog._fadeTimer);
  renderBattleLog._fadeTimer = setTimeout(() => {
    const latest = bl.querySelector('.log-line.latest');
    if (latest) latest.classList.remove('latest');
  }, 1200);
}

function addLog(msg) {
  battleState.log.push(msg);
  renderBattleLog();
}

function selectMove(moveIdx) {
  const bs = battleState;
  const mon = bs.pTeam[bs.activeIdx];
  const move = mon.moves[moveIdx];

  // Buff moves always self-target — skip the target phase
  if (move.type === 'buff') {
    bs.pendingMoves.push({ who:'player', mIdx:bs.activeIdx, move, tIdx:bs.activeIdx });
    const nextP = bs.pTeam.findIndex((m,i) => m.hp>0 && !bs.pendingMoves.find(p=>p.who==='player'&&p.mIdx===i));
    if (nextP === -1) {
      bs.eTeam.forEach((m,i) => {
        if (m.hp<=0) return;
        const alivePIdxs = bs.pTeam.map((pm,pi)=>pm.hp>0?pi:-1).filter(x=>x>=0);
        const mv = m.moves[Math.floor(Math.random()*m.moves.length)];
        const ti = mv.type === 'buff' ? i : alivePIdxs[Math.floor(Math.random()*alivePIdxs.length)];
        bs.pendingMoves.push({ who:'enemy', mIdx:i, move:mv, tIdx:ti });
      });
      bs.phase = 'resolving';
      renderBattle();
      setTimeout(executeTurn, 400);
    } else {
      bs.activeIdx = nextP;
      bs.phase = 'pick';
      renderBattle();
    }
    return;
  }

  bs.pendingMoves.push({ who:'player', mIdx:bs.activeIdx, move, tIdx:null });
  bs.phase = 'target';
  renderBattle();
}

function selectTarget(tIdx) {
  const bs = battleState;
  const last = bs.pendingMoves.slice().reverse().findIndex(p=>p.who==='player'&&p.tIdx===null);
  const realIdx = bs.pendingMoves.length - 1 - last;
  bs.pendingMoves[realIdx].tIdx = tIdx;

  // Find next player monster without a pending move
  const nextP = bs.pTeam.findIndex((m,i) => m.hp>0 && !bs.pendingMoves.find(p=>p.who==='player'&&p.mIdx===i));
  if (nextP === -1) {
    // All chosen — add enemy moves
    bs.eTeam.forEach((m,i) => {
      if (m.hp<=0) return;
      const alivePIdxs = bs.pTeam.map((pm,pi)=>pm.hp>0?pi:-1).filter(x=>x>=0);
      const mv = m.moves[Math.floor(Math.random()*m.moves.length)];
      const ti = mv.type === 'buff' ? i : alivePIdxs[Math.floor(Math.random()*alivePIdxs.length)];
      bs.pendingMoves.push({ who:'enemy', mIdx:i, move:mv, tIdx:ti });
    });
    bs.phase = 'resolving';
    renderBattle();
    setTimeout(executeTurn, 400);
  } else {
    bs.activeIdx = nextP;
    bs.phase = 'pick';
    renderBattle();
  }
}

function executeTurn() {
  const bs = battleState;
  // Sort by speed
  const sorted = bs.pendingMoves.slice().sort((a,b) => {
    const sa = a.who==='player' ? bs.pTeam[a.mIdx].spd : bs.eTeam[a.mIdx].spd;
    const sb = b.who==='player' ? bs.pTeam[b.mIdx].spd : bs.eTeam[b.mIdx].spd;
    return sb-sa;
  });

  for (const action of sorted) {
    const atk = action.who==='player' ? bs.pTeam[action.mIdx] : bs.eTeam[action.mIdx];
    if (atk.hp<=0) continue;

    // Not enough MP — skip
    if (atk.mp < action.move.mp) {
      addLog(`${atk.emoji} ${atk.name} is out of MP for ${action.move.name}!`);
      continue;
    }
    // Deduct MP
    atk.mp = Math.max(0, atk.mp - action.move.mp);

    if (action.move.type==='buff') {
      const stat = action.move.effect;
      atk.buffs[stat] = (atk.buffs[stat]||0)+20;
      const healAmt = Math.floor(atk.maxHp * 0.20);
      const prevHp = atk.hp;
      atk.hp = Math.min(atk.maxHp, atk.hp + healAmt);
      const healed = atk.hp - prevHp;
      addLog(`${atk.emoji} ${atk.name} used ${action.move.name}! ${stat.toUpperCase()} +20${healed>0?` · ❤ +${healed} HP`:''} [MP:${atk.mp}]`);
      continue;
    }

    const defTeam = action.who==='player' ? bs.eTeam : bs.pTeam;
    const def = defTeam[action.tIdx];
    if (!def || def.hp<=0) continue;

    // Hit chance: base 80% + (attacker SPD - defender SPD), clamped 10–95%
    const atkSpd = atk.spd + (atk.buffs?.spd||0);
    const defSpd = def.spd + (def.buffs?.spd||0);
    const hitChance = Math.min(0.95, Math.max(0.10, 0.80 + (atkSpd - defSpd) / 100 + (atk.hitBonus || 0) / 100));
    if (Math.random() > hitChance) {
      addLog(`${atk.emoji} ${atk.name} → ${action.move.name} → ${def.emoji} ${def.name}: MISS (${Math.round(hitChance*100)}%)`);
      continue;
    }

    const isPhysical = action.move.type === 'physical';
    const advantage = (!isPhysical && EL_ADVANTAGE[atk.element]===def.element) ? 1.5 : 1.0;
    const atkStat = atk.atk + (atk.buffs?.atk||0);
    const defStat = def.def + (def.buffs?.def||0);
    let dmg, levelNote;
    if (isPhysical) {
      // Level difference: positive = attacker is higher level (bonus dmg), negative = attacker is lower (reduced dmg)
      const lvlDiff = atk.level - def.level;
      const lvlMult = 1 + (lvlDiff * 0.15); // ±15% per level difference, uncapped
      const base = Math.floor((atkStat / defStat) * action.move.power * Math.max(0.1, lvlMult));
      dmg = Math.max(1, base + Math.floor(Math.random() * 6) - 3);
      if (lvlDiff > 0)       levelNote = ` ↑Lv+${lvlDiff}`;
      else if (lvlDiff < 0)  levelNote = ` ↓Lv${lvlDiff}`;
      else                   levelNote = ` =Lv`;
      // MP regeneration: INT / 10, minimum 1, capped at maxMp
      if (action.who === 'player') {
        const mpRegen = Math.max(1, Math.floor(atk.int / 10));
        const mpBefore = atk.mp;
        atk.mp = Math.min(atk.maxMp, atk.mp + mpRegen);
        const mpGained = atk.mp - mpBefore;
        if (mpGained > 0) levelNote += ` +${mpGained}MP`;
      }
    } else {
      dmg = Math.max(1, Math.floor((atkStat/defStat)*action.move.power*advantage) + Math.floor(Math.random()*8)-4);
      levelNote = '';
    }
    // Crit chance = SPD / 5 (as %), crit damage = ×1.25
    const critChance = Math.min(0.95, atkSpd / 500);
    const isCrit = Math.random() < critChance;
    if (isCrit) dmg = Math.floor(dmg * 1.25);

    def.hp = Math.max(0, def.hp - dmg);
    const seMsg  = advantage > 1 ? ' 💥 SUPER EFFECTIVE!' : '';
    const critMsg = isCrit ? ' ⚡ CRIT!' : '';
    const typeTag = isPhysical ? ` [PHY${levelNote}]` : '';
    addLog(`${atk.emoji} ${atk.name} → ${action.move.name}${typeTag} → ${def.emoji} ${def.name}: ${dmg} dmg${seMsg}${critMsg} [MP:${atk.mp}]`);
    if (def.hp<=0) addLog(`  💀 ${def.name} fainted!`);
  }

  bs.pendingMoves = [];
  // Tally resource drops from newly fainted enemies this turn
  bs.eTeam.forEach(m => {
    if (m.hp <= 0 && !m.droppedResources) {
      m.droppedResources = true;
      const qty = Math.floor(Math.random() * 4); // 0–3
      if (qty > 0) {
        bs.resourceDrops = bs.resourceDrops || {};
        bs.resourceDrops[m.element] = (bs.resourceDrops[m.element] || 0) + qty;
        addLog(`  💎 ${qty}x ${ELEMENTAL_RESOURCES[m.element].emoji} ${ELEMENTAL_RESOURCES[m.element].name} dropped!`);
      }
    }
  });

  const aliveP = bs.pTeam.filter(m=>m.hp>0);
  const aliveE = bs.eTeam.filter(m=>m.hp>0);

  if (aliveE.length===0 || aliveP.length===0) {
    bs.phase = 'result';
    renderBattle();
  } else {
    bs.activeIdx = bs.pTeam.findIndex(m=>m.hp>0);
    bs.phase = 'pick';
    renderBattle();
  }
}

function fleeBattle() {
  // Each enemy has 50% chance to hit one random party member
  const bs = battleState;
  const fleeLog = [];
  addLog('🏃 Fled from battle!');
  bs.eTeam.forEach(enemy => {
    if (Math.random() < 0.5) {
      const alive = bs.pTeam.filter(m => m.hp > 0);
      if (alive.length === 0) return;
      const target = alive[Math.floor(Math.random() * alive.length)];
      const dmg = Math.max(1, Math.floor(enemy.atk * 0.6));
      target.hp = Math.max(0, target.hp - dmg);
      fleeLog.push(`${enemy.emoji} ${enemy.name} strikes ${target.emoji} ${target.name} for ${dmg} dmg!`);
    }
  });
  // Persist flee damage back to STATE.party
  STATE.party = STATE.party.map(m => {
    const bs_mon = bs.pTeam.find(p => p.uid === m.uid);
    return bs_mon ? { ...m, hp: Math.max(0, bs_mon.hp) } : m;
  });
  // Persist log
  STATE.lastBattleLog = [...(bs.log || []), ...fleeLog.map(t => ({ text: t, type: 'damage' }))];
  STATE.lastBattleResult = 'defeat';
  updateLastBattleBtn();
  if (fleeLog.length > 0) toast(`🏃 Fled! ${fleeLog.length} enemy attack${fleeLog.length > 1 ? 's' : ''} landed!`);
  else toast('🏃 Fled safely!');
  setTimeout(() => { showScreen('map'); }, 500);
}

function endBattle(win, earned) {
  // Persist the log before clearing battle state
  STATE.lastBattleLog = [...(battleState.log || [])];
  STATE.lastBattleResult = win ? 'victory' : 'defeat';
  updateLastBattleBtn();
  // Revive rate: 30% on win, 10% on loss
  const revivePct = win ? 0.30 : 0.10;
  if (win) {
    STATE.gold += earned;
    // Collect elemental resource drops
    const drops = battleState.resourceDrops || {};
    Object.entries(drops).forEach(([el, qty]) => {
      STATE.resources[el] = (STATE.resources[el] || 0) + qty;
    });
    // XP + level up; restore HP from battle; revive fainted at 30% maxHp
    const xpGain = battleState.eTeam.reduce((s,m)=>s+m.level*20,0);
    STATE.party = STATE.party.map(m => {
      const survivor = battleState.pTeam.find(p=>p.uid===m.uid);
      const wasFainted = !survivor || survivor.hp <= 0;
      if (wasFainted) {
        // Revive at 30% maxHp; MP unchanged (already 0 or as-is)
        return { ...m, hp: Math.max(1, Math.floor(m.maxHp * revivePct)) };
      }
      let { xp, xpNeeded, level, maxHp, atk, def, spd, int:int_, hp } = m;
      let newXp = xp + xpGain;
      hp = survivor.hp;
      const mp = survivor.mp; // preserve MP spent in battle
      const baseStats = MONSTER_TYPES.find(t => t.id === m.typeId)?.base || { hp:80, atk:60, def:50, spd:50, int:50 };
      while (newXp >= xpNeeded) {
        newXp -= xpNeeded; level++; xpNeeded = level*100;
        const g = calcLevelUpGains(m.typeId, baseStats);
        maxHp+=g.hp; atk+=g.atk; def+=g.def; spd+=g.spd; int_+=g.int;
      }
      return { ...m, xp:newXp, xpNeeded, level, maxHp, hp:Math.min(hp,maxHp), mp, atk, def, spd, int:int_ };
    });
    const fainted = STATE.party.filter(m => {
      const s = battleState.pTeam.find(p=>p.uid===m.uid);
      return !s || s.hp <= 0;
    });
    const faintMsg = fainted.length > 0 ? ` · ${fainted.length} revived at 30% HP` : '';
    toast(`Victory! +${earned}g${faintMsg}`);
  } else {
    // Revive all fainted at 10%, keep survivors' HP from battle
    STATE.party = STATE.party.map(m => {
      const survivor = battleState.pTeam.find(p=>p.uid===m.uid);
      const wasFainted = !survivor || survivor.hp <= 0;
      if (wasFainted) {
        return { ...m, hp: Math.max(1, Math.floor(m.maxHp * revivePct)) };
      }
      return { ...m, hp: Math.max(1, survivor.hp), mp: survivor.mp };
    });
    toast('Defeated... fainted monsters revive at 10% HP.');
  }
  // If this was a boss battle, return to ruins
  if (STATE.encounter?.type === 'boss') {
    const bossKey = STATE.encounter.key;
    STATE.encounter = null;
    if (win) {
      showScreen('ruins');
      onBossDefeated(bossKey);
    } else {
      showScreen('ruins');
      renderRuins();
      toast('Your party was defeated... Return when ready.');
    }
  } else {
    STATE.encounter = null;
    showScreen('map');
  }
}

// Apply or remove component stat bonuses (sign: +1 to apply, -1 to remove)
function applyComponentStats(m, comp, sign) {
  const u = { ...m };
  Object.entries(comp.stats).forEach(([stat, val]) => {
    if (stat === 'maxHp') {
      u.maxHp = u.maxHp + sign * val;
      u.hp = sign > 0 ? Math.min(u.hp + val, u.maxHp) : Math.min(u.hp, u.maxHp);
    } else if (stat === 'maxMp') {
      u.maxMp = u.maxMp + sign * val;
      u.mp = sign > 0 ? Math.min(u.mp + val, u.maxMp) : Math.min(u.mp, u.maxMp);
    } else {
      u[stat] = (u[stat] || 0) + sign * val;
    }
  });
  return u;
}

function equipTech(monUid, techId) {
  const tech = TECH_ITEMS.find(t => t.id === techId);
  if (!tech) return;
  const applyAll = arr => arr.map(m => {
    if (m.uid !== monUid) return m;
    const updated = { ...m, equippedTech: techId, techSlots: [null, null, null] };
    if (tech.statStat === 'maxHp') {
      updated.maxHp = m.maxHp + tech.statBoost;
      updated.hp = Math.min(m.hp + tech.statBoost, updated.maxHp);
    } else {
      updated[tech.statStat] = m[tech.statStat] + tech.statBoost;
    }
    return updated;
  });
  STATE.party = applyAll(STATE.party);
  STATE.bench = applyAll(STATE.bench);
  // Consume one from inventory
  const idx = STATE.inventory.findIndex(i => i.id === techId);
  if (idx >= 0) STATE.inventory.splice(idx, 1);
  toast(`Equipped ${tech.emoji} ${tech.name}! +${tech.statBoost} ${tech.statStat.toUpperCase().replace('MAXHP','Max HP')}`);
  renderPartyList();
  renderMonDetail(monUid);
}

function unequipTech(monUid) {
  const mon = [...STATE.party, ...STATE.bench].find(m => m.uid === monUid);
  if (!mon || !mon.equippedTech) return;
  const tech = TECH_ITEMS.find(t => t.id === mon.equippedTech);
  const applyAll = arr => arr.map(m => {
    if (m.uid !== monUid) return m;
    // Remove all slotted component stats first
    let updated = { ...m };
    (m.techSlots || []).forEach(cId => {
      if (!cId) return;
      const comp = COMPONENT_TYPES.find(c => c.id === cId);
      if (comp) updated = applyComponentStats(updated, comp, -1);
    });
    // Remove tech stat
    if (tech.statStat === 'maxHp') {
      updated.maxHp = updated.maxHp - tech.statBoost;
      updated.hp = Math.min(updated.hp, updated.maxHp);
    } else {
      updated[tech.statStat] = updated[tech.statStat] - tech.statBoost;
    }
    return { ...updated, equippedTech: null, techSlots: null };
  });
  STATE.party = applyAll(STATE.party);
  STATE.bench = applyAll(STATE.bench);
  // Return slotted components to inventory first
  (mon.techSlots || []).forEach(cId => {
    if (!cId) return;
    const comp = COMPONENT_TYPES.find(c => c.id === cId);
    if (!comp) return;
    const cStack = STATE.inventory.filter(i => i.id === cId).length;
    if (cStack < 10) STATE.inventory.push({ ...comp });
  });
  // Return tech to inventory
  const stackCount = STATE.inventory.filter(i => i.id === tech.id).length;
  if (stackCount < 10) {
    STATE.inventory.push({ ...tech });
    toast(`Unequipped ${tech.emoji} ${tech.name} — returned to inventory.`);
  } else {
    toast(`Unequipped ${tech.emoji} ${tech.name} — inventory stack full, item lost!`);
  }
  renderPartyList();
  renderMonDetail(monUid);
}

function equipComponent(monUid, slotIdx, compId) {
  const comp = COMPONENT_TYPES.find(c => c.id === compId);
  if (!comp) return;
  const applyAll = arr => arr.map(m => {
    if (m.uid !== monUid) return m;
    const slots = [...(m.techSlots || [null, null, null])];
    slots[slotIdx] = compId;
    return applyComponentStats({ ...m, techSlots: slots }, comp, +1);
  });
  STATE.party = applyAll(STATE.party);
  STATE.bench = applyAll(STATE.bench);
  const idx = STATE.inventory.findIndex(i => i.id === compId);
  if (idx >= 0) STATE.inventory.splice(idx, 1);
  toast(`Installed ${comp.emoji} ${comp.name} in slot ${slotIdx + 1}!`);
  const mon = [...STATE.party, ...STATE.bench].find(m => m.uid === monUid);
  if (mon) renderMonDetail(monUid);
}

function unequipComponent(monUid, slotIdx) {
  const mon = [...STATE.party, ...STATE.bench].find(m => m.uid === monUid);
  if (!mon || !mon.techSlots?.[slotIdx]) return;
  const compId = mon.techSlots[slotIdx];
  const comp = COMPONENT_TYPES.find(c => c.id === compId);
  if (!comp) return;
  const applyAll = arr => arr.map(m => {
    if (m.uid !== monUid) return m;
    const slots = [...(m.techSlots || [null, null, null])];
    slots[slotIdx] = null;
    return applyComponentStats({ ...m, techSlots: slots }, comp, -1);
  });
  STATE.party = applyAll(STATE.party);
  STATE.bench = applyAll(STATE.bench);
  const stackCount = STATE.inventory.filter(i => i.id === compId).length;
  if (stackCount < 10) {
    STATE.inventory.push({ ...comp });
    toast(`Removed ${comp.emoji} ${comp.name} — returned to inventory.`);
  } else {
    toast(`Removed ${comp.emoji} ${comp.name} — inventory full, item lost!`);

  renderMonDetail(monUid);
}

function getStackedInventory() {
  const plantIds   = new Set(PLANT_TYPES.map(p => p.id));
  const mineralIds = new Set(MINERAL_TYPES.map(m => m.id));
  const techIds    = new Set(TECH_RECIPES.map(r => r.itemId));
  const stacks = {};
  const loose = [];
  STATE.inventory.forEach((item, idx) => {
    if (plantIds.has(item.id) || mineralIds.has(item.id) || techIds.has(item.id)) {
      if (stacks[item.id]) stacks[item.id].qty++;
      else stacks[item.id] = { ...item, qty: 1, stackId: item.id };
    } else {
      loose.push({ ...item, qty: 1, origIdx: idx });
    }
  });
  return [...Object.values(stacks), ...loose];
}

function renderInvGrid() {
  const grid = document.getElementById('inv-grid');

  // ── Resource summary card ──────────────────────────────
  const resCard = `<div style="grid-column:1/-1;background:#0a0a12;border:1px solid #2a2a3a;border-radius:8px;padding:10px 14px;margin-bottom:4px">
    <div style="font-size:13px;color:var(--dim);letter-spacing:2px;margin-bottom:8px">ELEMENTAL RESOURCES</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      ${Object.entries(STATE.resources).map(([el, qty]) => {
        const r = ELEMENTAL_RESOURCES[el];
        const elData = ELEMENTS[el];
        return `<div style="display:flex;align-items:center;gap:5px;background:${elData.bg};border:1px solid ${elData.color}44;border-radius:5px;padding:4px 9px">
          <span style="font-size:16px">${r.emoji}</span>
          <span style="color:${elData.color};font-size:15px">${r.name}</span>
          <span style="color:var(--gold);font-size:15px;margin-left:4px">${qty}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  const stacked = getStackedInventory();
  if (stacked.length === 0) {
    grid.innerHTML = resCard + '<div style="color:var(--dim);font-size:16px">No items yet. Explore the world!</div>';
    return;
  }

  grid.innerHTML = resCard + stacked.map((item) => {
    const plant   = PLANT_TYPES.find(p => p.id === item.id);
    const mineral = MINERAL_TYPES.find(m => m.id === item.id);
    const compDef = COMPONENT_TYPES.find(c => c.id === item.id);
    const recipe  = !plant && !mineral && TECH_RECIPES.find(r => r.itemId === item.id);
    const compRecipe = compDef && COMPONENT_RECIPES.find(r => r.itemId === item.id);
    const isTech  = item.type === 'tech';
    const isComp  = item.type === 'component';
    const rar     = item.rarity || (compDef?.rarity) || '';
    const val     = item.value  || (compDef?.value)  || 0;
    const rc      = rar==='rare'?'rare-rare':rar==='uncommon'?'rare-uncommon':'';
    const bdHint  = (plant || mineral)
      ? `${ELEMENTAL_RESOURCES[(plant||mineral).element].emoji} 1–3x ${ELEMENTAL_RESOURCES[(plant||mineral).element].name}`
      : recipe
        ? Object.entries(recipe.cost).map(([el, qty]) => `${ELEMENTAL_RESOURCES[el].emoji}${qty}`).join(' ')
        : compRecipe
          ? Object.entries(compRecipe.cost).map(([el, qty]) => `${ELEMENTAL_RESOURCES[el].emoji}${qty}`).join(' ')
          : '—';
    const stackCap = (isTech || isComp) ? 10 : 50;
    const stackLabel = item.qty > 1
      ? `<div style="font-size:13px;color:var(--gold);margin-top:2px">x${item.qty} / ${stackCap}</div>`
      : '';
    const useKey = item.stackId || ('loose_' + item.origIdx);
    const techEl = isTech ? ELEMENTS[item.element] : null;
    const mineralEl = mineral ? ELEMENTS[mineral.element] : null;
    const slotsHtml = isTech && item.slots
      ? `<div style="display:flex;gap:3px;margin:5px 0">
          ${item.slots.map((_,i) => `<div style="flex:1;background:#111;border:1px solid #222;border-radius:3px;padding:3px;text-align:center;font-size:10px;color:#333">SLOT ${i+1}</div>`).join('')}
        </div>`
      : '';
    const breakBtn = `<button onclick="promptBreakdownStack('${useKey}')" style="flex:1;background:#1a0a00;border:1px solid #ff6b2a;color:#ff6b2a;font-family:'VT323',monospace;font-size:15px;padding:4px 0;border-radius:4px;cursor:pointer" title="Breakdown → ${bdHint}">⚙ Break</button>`;
    const actionButtons = isTech
      ? `<button onclick="promptEquipFromInv('${item.id}')" style="flex:1;background:#0a1a2a;border:1px solid ${techEl.color};color:${techEl.color};font-family:'VT323',monospace;font-size:15px;padding:4px 0;border-radius:4px;cursor:pointer">⚙ Equip</button>
         ${breakBtn}`
      : (isComp || mineral)
        ? breakBtn
        : `<button onclick="promptUseItemStack('${useKey}')" style="flex:1;background:#0a2a10;border:1px solid var(--accent);color:var(--accent);font-family:'VT323',monospace;font-size:15px;padding:4px 0;border-radius:4px;cursor:pointer">▶ Use</button>
           ${breakBtn}`;
    const cardBorder = isTech ? `style="border-color:${techEl.color}88"` : mineral ? `style="border-color:${mineralEl.color}88"` : isComp ? `style="border-color:${rar==='rare'?'#ffd700':rar==='uncommon'?'#a855f7':'#2a3a4a'}88"` : '';
    const effText = isTech ? `+${item.statBoost} ${item.statStat.toUpperCase().replace('MAXHP','Max HP')}` : isComp ? (compDef?.effect || item.effect) : item.effect;
    const rarityLine = isComp
      ? `<div class="ic-rare" style="color:#2ab8ff">${rar} component · 💰${val}</div>`
      : isTech
        ? `<div class="ic-rare">${rar}</div>`
        : `<div class="ic-rare">${rar} · 💰${val}</div>`;
    const typeTag = isTech
      ? ` <span style="font-size:11px;color:${techEl.color}">TECH</span>`
      : mineral ? ` <span style="font-size:11px;color:${mineralEl.color}">MINERAL</span>`
      : isComp  ? ` <span style="font-size:11px;color:#2ab8ff">COMP</span>`
      : '';
    return `<div class="inv-card ${rc}" ${cardBorder}>
      <div class="ic-emoji">${item.emoji}</div>
      <div class="ic-name">${item.name}${typeTag}</div>
      ${stackLabel}
      ${slotsHtml}
      <div class="ic-eff">${effText}</div>
      ${rarityLine}
      <div style="display:flex;gap:6px;margin-top:7px">${actionButtons}</div>
    </div>`;
  }).join('');
}

// Resolve a useKey back to the first matching inventory index
function resolveItemIdx(useKey) {
  if (useKey.startsWith('loose_')) {
    return parseInt(useKey.replace('loose_', ''));
  }
  // stackId = item id — find first occurrence
  return STATE.inventory.findIndex(i => i.id === useKey);
}

function promptUseItemStack(useKey) {
  const idx = resolveItemIdx(useKey);
  promptUseItem(idx);
}

function promptBreakdownStack(useKey) {
  const idx = resolveItemIdx(useKey);
  promptBreakdown(idx);
}
